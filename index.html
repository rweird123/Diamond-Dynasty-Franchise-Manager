<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicago Herons | Franchise Manager</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ede4d1;
  --bg-alt: #e3d9c4;
  --surface: #f9f5eb;
  --surface-hover: #f3eed8;
  --navy: #1b2a4a;
  --navy-light: #2a3d66;
  --red: #b5342b;
  --red-hover: #962c25;
  --green: #24774a;
  --green-bg: #e6f2eb;
  --gold: #b8880a;
  --gold-bg: #fdf6e3;
  --orange: #c46210;
  --text: #2c2416;
  --text-muted: #7a6b57;
  --text-light: #a09480;
  --border: #d4c5a0;
  --border-light: #e4d8bd;
  --shadow: rgba(44, 36, 22, 0.08);
  --shadow-md: rgba(44, 36, 22, 0.12);
  --font-serif: Georgia, 'Times New Roman', serif;
  --font-sans: -apple-system, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'Courier New', Courier, monospace;
  --radius: 6px;
  --radius-lg: 10px;
}

html { font-size: 15px; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.app { max-width: 1160px; margin: 0 auto; padding: 0 20px 72px; }

/* ── HEADER ── */
.header {
  background: var(--navy);
  color: #f0e6d2;
  padding: 18px 28px;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 3px 12px rgba(27,42,74,0.25);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-icon { font-size: 28px; }
.team-name {
  font-family: var(--font-serif);
  font-size: 1.65rem;
  letter-spacing: 3px;
  font-weight: 700;
  text-transform: uppercase;
}
.team-info {
  font-size: 0.78rem;
  opacity: 0.6;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.header-right { text-align: right; }
.record { font-family: var(--font-mono); font-size: 1.7rem; font-weight: 700; letter-spacing: 2px; }
.record-wins { color: #6ecf8e; }
.record-losses { color: #f0a0a0; }
.record-sep { opacity: 0.4; margin: 0 2px; }
.standing { font-size: 0.75rem; opacity: 0.55; text-transform: uppercase; letter-spacing: 1px; }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 2px;
  margin-top: 16px;
  background: var(--border);
  border-radius: var(--radius-lg);
  padding: 3px;
  overflow-x: auto;
}
.tab {
  flex: 1;
  padding: 10px 12px;
  background: transparent;
  border: none;
  font-family: var(--font-sans);
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab:hover { background: rgba(249,245,235,0.5); color: var(--text); }
.tab.active {
  background: var(--surface);
  color: var(--navy);
  box-shadow: 0 1px 4px var(--shadow);
}

/* ── CONTENT ── */
.content { margin-top: 20px; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 20px 22px;
  box-shadow: 0 2px 8px var(--shadow);
}
.card-title {
  font-family: var(--font-serif);
  font-size: 0.75rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-light);
}
.card-value {
  font-family: var(--font-mono);
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--navy);
}
.card-sub { font-size: 0.82rem; color: var(--text-muted); margin-top: 4px; }

/* ── DASHBOARD ── */
.dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px; }
.perf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.perf-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
}
.perf-row:last-child { border-bottom: none; }
.perf-name { font-family: var(--font-serif); font-weight: 600; }
.perf-pos { font-size: 0.78rem; color: var(--text-muted); margin-left: 6px; }
.perf-stat { font-family: var(--font-mono); font-weight: 700; color: var(--navy); }
.payroll-bar-track {
  height: 10px;
  background: var(--bg-alt);
  border-radius: 5px;
  margin-top: 12px;
  overflow: hidden;
}
.payroll-bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.5s ease;
}
.alert-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: #fef3f2;
  border: 1px solid #fecaca;
  border-radius: var(--radius);
  margin-bottom: 8px;
  font-size: 0.88rem;
}
.alert-item:last-child { margin-bottom: 0; }
.alert-icon { font-size: 1rem; }
.alert-text b { font-family: var(--font-serif); }

/* ── ROSTER TABLE ── */
.roster-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 10px;
}
.filter-group { display: flex; gap: 4px; }
.filter-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-family: var(--font-sans);
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: var(--radius);
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--navy); color: var(--text); }
.filter-btn.active { background: var(--navy); color: #f0e6d2; border-color: var(--navy); }
.roster-count { font-size: 0.82rem; color: var(--text-muted); }

.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}
th {
  font-family: var(--font-sans);
  font-size: 0.72rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: left;
  padding: 8px 10px;
  border-bottom: 2px solid var(--border);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  transition: color 0.15s;
}
th:hover { color: var(--navy); }
th.sorted { color: var(--navy); }
th .sort-arrow { font-size: 0.65rem; margin-left: 3px; }
td {
  padding: 10px 10px;
  border-bottom: 1px solid var(--border-light);
  white-space: nowrap;
}
tr { cursor: pointer; transition: background 0.15s; }
tr:hover { background: var(--surface-hover); }
.stat-num { font-family: var(--font-mono); font-size: 0.86rem; }
.player-name-cell { font-family: var(--font-serif); font-weight: 600; }
.pos-badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 3px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  background: var(--bg-alt);
  color: var(--text-muted);
}
.ovr-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 24px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 0.82rem;
  font-weight: 700;
  color: white;
}
.salary-cell { color: var(--green); font-family: var(--font-mono); font-weight: 600; }
.expiring { color: var(--red) !important; }

/* ── LINEUP / ROTATION ── */
.split-layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
.lineup-card-wrap .card { position: relative; overflow: hidden; }
.lineup-card-wrap .card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 5px;
  height: 100%;
  background: var(--navy);
}
.lineup-slot {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  margin-bottom: 6px;
  background: white;
  transition: all 0.2s;
  gap: 10px;
}
.lineup-slot:last-child { margin-bottom: 0; }
.lineup-slot:hover { border-color: var(--navy); }
.lineup-slot.empty {
  border-style: dashed;
  background: var(--surface-hover);
  cursor: pointer;
}
.lineup-slot.empty:hover { background: var(--gold-bg); border-color: var(--gold); }
.slot-num {
  font-family: var(--font-mono);
  font-size: 0.92rem;
  font-weight: 700;
  color: var(--navy);
  min-width: 22px;
}
.slot-pos {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-muted);
  min-width: 30px;
}
.slot-name { font-family: var(--font-serif); font-weight: 600; flex: 1; }
.slot-stat { font-family: var(--font-mono); font-size: 0.82rem; color: var(--text-muted); }
.slot-actions { display: flex; gap: 3px; }
.slot-btn {
  width: 24px;
  height: 24px;
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.72rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: all 0.15s;
}
.slot-btn:hover { background: var(--navy); color: white; border-color: var(--navy); }
.slot-btn.remove:hover { background: var(--red); border-color: var(--red); }

.avail-list { display: flex; flex-direction: column; gap: 6px; }
.avail-player {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  background: white;
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
  gap: 10px;
}
.avail-player:hover { border-color: var(--green); background: var(--green-bg); }
.avail-plus {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--green);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 1rem;
  flex-shrink: 0;
}
.avail-name { font-family: var(--font-serif); font-weight: 600; flex: 1; }
.avail-stat { font-family: var(--font-mono); font-size: 0.82rem; color: var(--text-muted); }

.lineup-summary {
  display: flex;
  gap: 24px;
  margin-top: 14px;
  padding: 12px 16px;
  background: var(--bg-alt);
  border-radius: var(--radius);
  font-size: 0.84rem;
}
.lineup-summary span { color: var(--text-muted); }
.lineup-summary b { font-family: var(--font-mono); color: var(--navy); margin-left: 4px; }

/* Bullpen section */
.rotation-section { margin-top: 20px; }
.role-label {
  font-family: var(--font-serif);
  font-size: 0.72rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin: 14px 0 8px;
}
.role-label:first-child { margin-top: 0; }

/* ── PAYROLL ── */
.payroll-summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
.payroll-stat {
  text-align: center;
  padding: 16px;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
}
.payroll-stat-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.payroll-stat-value {
  font-family: var(--font-mono);
  font-size: 1.3rem;
  font-weight: 700;
}
.payroll-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
.chart-container { position: relative; width: 100%; height: clamp(220px, 30vh, 300px); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(44, 36, 22, 0.5);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  padding: 20px;
  backdrop-filter: blur(3px);
}
.modal-overlay.open { display: flex; }
.modal-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: 0 12px 40px rgba(27,42,74,0.25);
  max-width: 520px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } }
.modal-header {
  display: flex;
  gap: 16px;
  padding: 24px 24px 16px;
  border-bottom: 1px solid var(--border-light);
}
.modal-avatar {
  width: 72px;
  height: 88px;
  background: var(--navy);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #f0e6d2;
  flex-shrink: 0;
}
.modal-initials { font-family: var(--font-serif); font-size: 1.3rem; font-weight: 700; }
.modal-jersey { font-family: var(--font-mono); font-size: 0.7rem; opacity: 0.6; margin-top: 2px; }
.modal-name { font-family: var(--font-serif); font-size: 1.3rem; font-weight: 700; color: var(--navy); }
.modal-meta { font-size: 0.85rem; color: var(--text-muted); margin-top: 3px; }
.modal-ratings { display: flex; gap: 16px; margin-top: 10px; }
.modal-rating-item { font-size: 0.82rem; }
.modal-rating-label { color: var(--text-muted); }
.modal-rating-val { font-family: var(--font-mono); font-weight: 700; }
.modal-traits { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.trait-tag {
  padding: 3px 8px;
  background: var(--gold-bg);
  border: 1px solid #e8d5a0;
  border-radius: 3px;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--gold);
}
.modal-body { padding: 16px 24px 24px; }
.modal-section-title {
  font-family: var(--font-serif);
  font-size: 0.7rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin: 16px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-light);
}
.modal-section-title:first-child { margin-top: 0; }
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 8px;
}
.stat-item { text-align: center; }
.stat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
.stat-val { font-family: var(--font-mono); font-size: 1rem; font-weight: 700; color: var(--navy); margin-top: 2px; }
.contract-info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.contract-item { padding: 8px 12px; background: var(--bg); border-radius: var(--radius); }
.contract-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.contract-val { font-family: var(--font-mono); font-weight: 700; margin-top: 2px; }
.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 30px;
  height: 30px;
  border: none;
  background: var(--bg-alt);
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: all 0.15s;
}
.modal-close:hover { background: var(--red); color: white; }
.potential-stars { color: var(--gold); letter-spacing: 1px; }

/* ── RESPONSIVE ── */
@media (max-width: 800px) {
  .dash-grid { grid-template-columns: 1fr; }
  .perf-grid { grid-template-columns: 1fr; }
  .split-layout { grid-template-columns: 1fr; }
  .payroll-summary { grid-template-columns: repeat(2, 1fr); }
  .payroll-layout { grid-template-columns: 1fr; }
  .header { flex-direction: column; gap: 10px; text-align: center; }
  .header-right { text-align: center; }
  .team-name { font-size: 1.3rem; letter-spacing: 2px; }
}
@media (max-width: 500px) {
  html { font-size: 14px; }
  .app { padding: 0 12px 72px; }
  .header { padding: 14px 18px; }
  .tabs { gap: 0; }
  .tab { padding: 8px 6px; font-size: 0.7rem; letter-spacing: 0.5px; }
}

/* ── PRINT ── */
@media print {
  body { background: white; }
  .header { break-after: avoid; box-shadow: none; }
  .tabs { display: none; }
  .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  table { font-size: 0.8rem; }
  tr { break-inside: avoid; }
  .modal-overlay { display: none !important; }
  .slot-actions { display: none; }
  .avail-player { border: 1px solid #ccc; }
}

/* ── AUTO LINEUP BTN ── */
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-navy { background: var(--navy); color: #f0e6d2; }
.btn-navy:hover { background: var(--navy-light); }
.btn-red { background: var(--red); color: white; }
.btn-red:hover { background: var(--red-hover); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.btn-outline:hover { border-color: var(--navy); color: var(--navy); }
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

/* ── PLAY TAB ── */
.result-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 22px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}
.result-badge.win { background: var(--green); }
.result-badge.loss { background: var(--red); }
.line-score-table td, .line-score-table th { padding: 6px 8px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.game-matchup {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 16px;
  padding: 12px 0;
}
.game-team { text-align: center; flex: 1; }
.game-team-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.game-team-name { font-family: var(--font-serif); font-size: 1.15rem; font-weight: 700; margin-top: 4px; }
.game-at { font-family: var(--font-serif); font-size: 1.4rem; color: var(--border); }
.play-actions { display: flex; gap: 10px; }
.box-halves { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 800px) {
  .box-halves { grid-template-columns: 1fr; }
}
/* ── OFF-SEASON ── */
.offer-years { display: flex; gap: 4px; flex-wrap: wrap; }
.yr-btn {
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-family: var(--font-mono);
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: var(--radius);
  transition: all 0.15s;
}
.yr-btn:hover { border-color: var(--navy); color: var(--text); }
.yr-btn.active { background: var(--navy); color: #f0e6d2; border-color: var(--navy); }
input[type="range"] { width: 100%; accent-color: var(--navy); }
.offseason-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
}
</style>
</head>
<body>
<div id="startMenu" style="display:none;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
  <div style="text-align:center;max-width:480px;width:100%">
    <div style="font-size:3rem;margin-bottom:8px">&#9918;</div>
    <h1 style="font-family:Georgia,'Times New Roman',serif;font-size:2.2rem;letter-spacing:3px;color:#1b2a4a;text-transform:uppercase;margin-bottom:4px">Diamond Dynasty</h1>
    <div style="font-family:Georgia,serif;font-size:1rem;color:#7a6b57;letter-spacing:2px;text-transform:uppercase;margin-bottom:40px">Franchise Manager</div>
    <div style="display:flex;flex-direction:column;gap:12px;max-width:300px;margin:0 auto" id="menuButtons"></div>
    <div style="margin-top:40px;font-size:0.78rem;color:#a09480">Manage your roster. Scout the draft. Build a dynasty.</div>
  </div>
</div>

<div class="app" id="gameContainer" style="display:none">

function p(id) { return PLAYERS.find(x => x.id === id); }
function fmt$(n) { return n >= 1000000 ? '$' + (n/1000000).toFixed(1) + 'M' : '$' + (n/1000).toFixed(0) + 'K'; }
function fmtAvg(n) { return n.toFixed(3).replace(/^0/,''); }
function ovrColor(o) { return o >= 90 ? '#1a6b30' : o >= 80 ? '#24774a' : o >= 70 ? '#b8880a' : o >= 60 ? '#c46210' : '#b5342b'; }
function potStars(pot) { const s = pot >= 90 ? 5 : pot >= 80 ? 4 : pot >= 70 ? 3 : pot >= 60 ? 2 : 1; return '★'.repeat(s) + '☆'.repeat(5-s); }
function war(pl) { if (pl.isPitcher) { const e = pl.pitching.era; return e <= 2.5 ? 5.5 : e <= 3 ? 4.5 : e <= 3.5 ? 3.5 : e <= 4 ? 2.5 : e <= 4.5 ? 1.5 : 0.5; } const ops = pl.batting.obp + pl.batting.slg; return ops >= 0.900 ? 5.5 : ops >= 0.830 ? 4.5 : ops >= 0.770 ? 3.5 : ops >= 0.700 ? 2.5 : ops >= 0.650 ? 1.5 : 0.5; }
function totalPayroll() { return PLAYERS.reduce((s,p) => s + p.contract.salary, 0); }

function calculateRevenue() {
  const wins = state.season.wins || 0;
  const playoffRev = (state.playoffs && state.playoffs.userMade) ? 15000000 : 0;
  const champRev = (state.playoffs && state.playoffs.wsChamp && state.playoffs.wsChamp.isUser) ? 30000000 : 0;
  return TEAM.baseRevenue + wins * 500000 + playoffRev + champRev;
}

function calculateCBT(extraSalary) {
  const tp = totalPayroll() + (extraSalary || 0);
  const over = tp - TEAM.cbtThreshold;
  if (over <= 0) return { amount:0, rate:0, over:0 };
  const yrs = TEAM.cbtYearsOver;
  const rate = yrs <= 0 ? 0.20 : yrs === 1 ? 0.30 : yrs === 2 ? 0.50 : 0.60;
  return { amount: Math.round(over * rate), rate, over };
}

function seasonBat(id) {
  const s = state.season.batting[id];
  if (!s || s.ab === 0) return null;
  return { g:s.g, ab:s.ab, h:s.h, hr:s.hr, rbi:s.rbi, r:s.r, bb:s.bb, so:s.so, d:s.d, t:s.t,
    avg: s.h/s.ab, obp: (s.h+s.bb)/(s.ab+s.bb), slg: (s.h+s.d+2*s.t+3*s.hr)/s.ab };
}
function seasonPitch(id) {
  const s = state.season.pitching[id];
  if (!s || s.ip === 0) return null;
  return { gs:s.gs, w:s.w, l:s.l, ip:s.ip, h:s.h, r:s.r, bb:s.bb, k:s.k,
    era: (s.r/s.ip)*9, whip: (s.h+s.bb)/s.ip };
}
function seasonWar(pl) {
  if (pl.isPitcher) { const sp = seasonPitch(pl.id); if (!sp) return 0; const e = sp.era; return e<=2.5?5.5:e<=3?4.5:e<=3.5?3.5:e<=4?2.5:e<=4.5?1.5:0.5; }
  const sb = seasonBat(pl.id); if (!sb) return 0;
  const ops = sb.obp+sb.slg; return ops>=0.900?5.5:ops>=0.830?4.5:ops>=0.770?3.5:ops>=0.700?2.5:ops>=0.650?1.5:0.5;
}

// ════════════════════════ SAVE / LOAD ════════════════════════

const SAVE_KEY = 'herons_franchise_save';

function saveGame() {
  const saveData = {
    version: 2,
    state: state,
    players: PLAYERS,
    team: TEAM,
    opponents: OPPONENTS.map(o => ({ name:o.name, abbr:o.abbr, str:o.str, w:o.w, l:o.l, div:o.div })),
    nextFAId: nextFAId
  };
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
    return true;
  } catch(e) {
    console.error('Save failed:', e);
    return false;
  }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const save = JSON.parse(raw);
    if (!save || !save.state || !save.players) return false;
    state = save.state;
    PLAYERS = save.players;
    TEAM = save.team;
    nextFAId = save.nextFAId || 200;
    save.opponents.forEach((so, i) => {
      if (OPPONENTS[i]) { OPPONENTS[i].w = so.w; OPPONENTS[i].l = so.l; }
    });
    return true;
  } catch(e) {
    console.error('Load failed:', e);
    return false;
  }
}

function deleteSave() {
  if (confirm('Delete your saved franchise? This cannot be undone.')) {
    localStorage.removeItem(SAVE_KEY);
    location.reload();
  }
}

    ${hasSave ? `<button class="btn btn-navy" onclick="continueGame()" style="padding:14px 24px;font-size:1.05rem;width:100%">Continue Franchise</button>` : ''}
    <button class="btn ${hasSave?'btn-outline':'btn-navy'}" onclick="newFranchise()" style="padding:14px 24px;font-size:1.05rem;width:100%">New Franchise</button>
    ${hasSave ? `<button class="btn btn-outline" onclick="deleteSave()" style="padding:10px 24px;font-size:0.85rem;width:100%;color:var(--red);border-color:var(--red)">Delete Save Data</button>` : ''}
    <button class="btn btn-outline" onclick="showHelp()" style="padding:10px 24px;font-size:0.85rem;width:100%">How to Play</button>
  `;
}

function continueGame() {
  const loaded = loadGame();
  if (!loaded) { alert('No save data found.'); return; }
  startGameUI();
}

function newFranchise() {
  if (localStorage.getItem(SAVE_KEY)) {
    if (!confirm('Start a new franchise? This will overwrite your current save.')) return;
    localStorage.removeItem(SAVE_KEY);
    location.reload();
    return;
  }
  startGameUI();
}

function startGameUI() {
  document.getElementById('startMenu').style.display = 'none';
  document.getElementById('gameContainer').style.display = 'block';
  if (!state.draftProspects.length) generateDraftClass();
  updateHeader();
  const hi = document.getElementById('headerInfo');
  if (hi) hi.textContent = 'AL Central • Season ' + state.seasonNumber;
  renderTabs();
  render();
  setInterval(autoSave, 30000);
}

function updateHeader() {
  const w = document.getElementById('headerWins');
  const l = document.getElementById('headerLosses');
  const st = document.getElementById('headerStanding');
  const hi = document.getElementById('headerInfo');
  if (w) w.textContent = state.season.wins;
  if (l) l.textContent = state.season.losses;
  if (st) st.textContent = state.offseason ? 'Off-Season' : (state.draftState ? 'Draft' : 'Season ' + state.seasonNumber);
  if (hi) hi.textContent = 'AL Central • Season ' + state.seasonNumber;
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = TABS.map(t => {
    const label = t.id === 'play' ? (state.draftState ? 'Draft' : state.offseason ? 'Off-Season' : t.label) : t.label;
    return `<button class="tab ${t.id === state.tab ? 'active' : ''}" data-tab="${t.id}" onclick="switchTab('${t.id}')">${label}</button>`;
  }).join('');
}

function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  if (payrollChart) { payrollChart.destroy(); payrollChart = null; }
  render();
}

function render() {
  const el = document.getElementById('content');
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';
  switch(state.tab) {
    case 'dashboard': el.innerHTML = renderDashboard(); break;
    case 'roster': el.innerHTML = renderRoster(); break;
    case 'manage': el.innerHTML = renderManage(); break;
    case 'scouting': el.innerHTML = renderScouting(); break;
    case 'payroll': el.innerHTML = renderPayroll(); initPayrollChart(); break;
    case 'play':
      if (state.draftState) el.innerHTML = renderDraft();
      else if (state.offseason) el.innerHTML = renderOffseason();
      else el.innerHTML = renderPlay();
      break;
  }
}

// ════════════════════════ DASHBOARD ════════════════════════
function renderDashboard() {
  const tp = totalPayroll();
  const cbt = calculateCBT();
  const overCBT = tp - TEAM.cbtThreshold;
  const pct = Math.min(130, (tp / TEAM.cbtThreshold * 100)).toFixed(0);
  const barColor = overCBT > 0 ? 'var(--red)' : pct > 90 ? 'var(--gold)' : 'var(--green)';
  const gp = state.season.gamesPlayed;
  const sw = state.season.wins, sl = state.season.losses;
  const rs = state.season.rs, ra = state.season.ra, rd = rs - ra;

  const posBatters = PLAYERS.filter(x => !x.isPitcher).sort((a,b) => {
    const sa = seasonBat(a.id), sb2 = seasonBat(b.id);
    if (!sa && !sb2) return b.ovr - a.ovr;
    if (!sa) return 1; if (!sb2) return -1;
    return (sb2.obp+sb2.slg) - (sa.obp+sa.slg);
  }).slice(0,4);

  const topPitchers = PLAYERS.filter(x => x.isPitcher).sort((a,b) => {
    const sa = seasonPitch(a.id), sb2 = seasonPitch(b.id);
    if (!sa && !sb2) return b.ovr - a.ovr;
    if (!sa) return 1; if (!sb2) return -1;
    return sa.era - sb2.era;
  }).slice(0,4);

  const expiring = PLAYERS.filter(x => x.contract.yrs <= 1).sort((a,b) => b.contract.salary - a.contract.salary);

  return `
    <div class="dash-grid">
      <div class="card">
        <div class="card-title">Season 2 Record</div>
        <div class="card-value">${sw} &ndash; ${sl}</div>
        <div class="card-sub">${gp > 0 ? ('.'+((sw/gp).toFixed(3).slice(2))+' &bull; '+gp+' games played') : 'No games played &mdash; hit Play Ball to start'}</div>
      </div>
      <div class="card">
        <div class="card-title">Run Differential</div>
        <div class="card-value" style="color:${gp === 0 ? 'var(--text-muted)' : rd >= 0 ? 'var(--green)' : 'var(--red)'}">${gp > 0 ? ((rd >= 0 ? '+' : '')+rd) : '&mdash;'}</div>
        <div class="card-sub">${gp > 0 ? (rs+' RS &bull; '+ra+' RA') : 'No data yet'}</div>
      </div>
      <div class="card">
        <div class="card-title">Payroll</div>
        <div class="card-value">${fmt$(tp)}</div>
        <div class="card-sub">${overCBT > 0 ? fmt$(overCBT)+' over CBT &bull; Tax: '+fmt$(cbt.amount) : fmt$(Math.abs(overCBT))+' under luxury tax'}</div>
        <div class="payroll-bar-track"><div class="payroll-bar-fill" style="width:${Math.min(100,pct)}%;background:${barColor}"></div></div>
      </div>
    </div>

    <div class="perf-grid">
      <div class="card">
        <div class="card-title">Top Hitters</div>
        ${posBatters.map(pl => {
          const sb = seasonBat(pl.id);
          return `<div class="perf-row" onclick="openModal(${pl.id})" style="cursor:pointer">
            <div><span class="perf-name">${pl.fn} ${pl.ln}</span><span class="perf-pos">${pl.pos}</span></div>
            <div style="display:flex;align-items:center;gap:12px">
              <span class="stat-num">${sb ? fmtAvg(sb.avg)+' / '+sb.hr+' HR' : 'No games'}</span>
              <span class="ovr-badge" style="background:${ovrColor(pl.ovr)}">${pl.ovr}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="card">
        <div class="card-title">Top Pitchers</div>
        ${topPitchers.map(pl => {
          const sp = seasonPitch(pl.id);
          return `<div class="perf-row" onclick="openModal(${pl.id})" style="cursor:pointer">
            <div><span class="perf-name">${pl.fn} ${pl.ln}</span><span class="perf-pos">${pl.pos}</span></div>
            <div style="display:flex;align-items:center;gap:12px">
              <span class="stat-num">${sp ? sp.era.toFixed(2)+' ERA / '+sp.k+' K' : 'No starts'}</span>
              <span class="ovr-badge" style="background:${ovrColor(pl.ovr)}">${pl.ovr}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    ${expiring.length ? `
    <div class="card">
      <div class="card-title">Expiring Contracts</div>
      ${expiring.map(pl => `
        <div class="alert-item" onclick="openModal(${pl.id})" style="cursor:pointer">
          <span class="alert-icon">&#9888;</span>
          <span class="alert-text"><b>${pl.fn} ${pl.ln}</b> (${pl.pos}) &mdash; ${fmt$(pl.contract.salary)} &bull; Becomes a free agent after this season</span>
        </div>
      `).join('')}
    </div>` : ''}

    ${renderFranchiseHistory()}

    <div class="card" style="margin-top:16px">
      <div class="card-title">Game Data</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-navy" onclick="if(saveGame()){alert('Game saved!')}else{alert('Save failed')}">Save Game</button>
        <span style="font-size:0.82rem;color:var(--text-muted)">${localStorage.getItem(SAVE_KEY)?'Last save: auto-saved every 30s + after key events':'No save data found'}</span>
        <button class="btn btn-outline" onclick="deleteSave()" style="margin-left:auto;color:var(--red);border-color:var(--red)">Reset Franchise</button>
      </div>
    </div>
  `;
}

function renderRoster() {
  const filters = [
    { id:'all', label:'All' },
    { id:'pos', label:'Position Players' },
    { id:'pitch', label:'Pitchers' }
  ];
  let players = [...PLAYERS];
  if (state.filter === 'pos') players = players.filter(x => !x.isPitcher);
  if (state.filter === 'pitch') players = players.filter(x => x.isPitcher);

  const sc = state.sort.col;
  const sd = state.sort.dir === 'asc' ? 1 : -1;
  players.sort((a,b) => {
    let va, vb;
    const sba = !a.isPitcher ? seasonBat(a.id) : null;
    const sbb = !b.isPitcher ? seasonBat(b.id) : null;
    const spa = a.isPitcher ? seasonPitch(a.id) : null;
    const spb = b.isPitcher ? seasonPitch(b.id) : null;
    switch(sc) {
      case 'name': return a.ln.localeCompare(b.ln) * sd;
      case 'pos': return a.pos.localeCompare(b.pos) * sd;
      case 'age': va = a.age; vb = b.age; break;
      case 'ovr': va = a.ovr; vb = b.ovr; break;
      case 'war': va = seasonWar(a); vb = seasonWar(b); break;
      case 'salary': va = a.contract.salary; vb = b.contract.salary; break;
      case 'avg': va = sba ? sba.avg : -1; vb = sbb ? sbb.avg : -1; break;
      case 'hr': va = sba ? sba.hr : -1; vb = sbb ? sbb.hr : -1; break;
      case 'rbi': va = sba ? sba.rbi : -1; vb = sbb ? sbb.rbi : -1; break;
      case 'era': va = spa ? spa.era : 99; vb = spb ? spb.era : 99; return (va - vb) * (state.sort.dir === 'asc' ? 1 : -1);
      case 'k': va = spa ? spa.k : -1; vb = spb ? spb.k : -1; break;
      default: va = a.ovr; vb = b.ovr;
    }
    return (va - vb) * sd;
  });

  const arrow = (col) => state.sort.col === col ? `<span class="sort-arrow">${state.sort.dir === 'asc' ? '▲' : '▼'}</span>` : '';
  const sorted = (col) => state.sort.col === col ? 'sorted' : '';

  let headers, rows;
  if (state.filter === 'pitch') {
    headers = `<tr>
      <th class="${sorted('name')}" onclick="sortBy('name')">Player${arrow('name')}</th>
      <th class="${sorted('pos')}" onclick="sortBy('pos')">Pos${arrow('pos')}</th>
      <th class="${sorted('age')}" onclick="sortBy('age')">Age${arrow('age')}</th>
      <th class="${sorted('ovr')}" onclick="sortBy('ovr')">OVR${arrow('ovr')}</th>
      <th class="${sorted('era')}" onclick="sortBy('era')">ERA${arrow('era')}</th>
      <th>W-L</th><th>WHIP</th>
      <th class="${sorted('k')}" onclick="sortBy('k')">K${arrow('k')}</th>
      <th>IP</th><th>GS</th>
      <th class="${sorted('salary')}" onclick="sortBy('salary')">Salary${arrow('salary')}</th>
    </tr>`;
    rows = players.map(pl => {
      const sp = seasonPitch(pl.id);
      return `<tr onclick="openModal(${pl.id})">
        <td class="player-name-cell">${pl.fn} ${pl.ln}</td>
        <td><span class="pos-badge">${pl.pos}</span></td>
        <td class="stat-num">${pl.age}</td>
        <td><span class="ovr-badge" style="background:${ovrColor(pl.ovr)}">${pl.ovr}</span></td>
        <td class="stat-num">${sp ? sp.era.toFixed(2) : '---'}</td>
        <td class="stat-num">${sp ? sp.w+'-'+sp.l : '---'}</td>
        <td class="stat-num">${sp ? sp.whip.toFixed(2) : '---'}</td>
        <td class="stat-num">${sp ? sp.k : '---'}</td>
        <td class="stat-num">${sp ? sp.ip : '---'}</td>
        <td class="stat-num">${sp ? sp.gs : '0'}</td>
        <td class="salary-cell ${pl.contract.yrs<=1?'expiring':''}">${fmt$(pl.contract.salary)}</td>
      </tr>`;
    }).join('');
  } else {
    headers = `<tr>
      <th class="${sorted('name')}" onclick="sortBy('name')">Player${arrow('name')}</th>
      <th class="${sorted('pos')}" onclick="sortBy('pos')">Pos${arrow('pos')}</th>
      <th class="${sorted('age')}" onclick="sortBy('age')">Age${arrow('age')}</th>
      <th class="${sorted('ovr')}" onclick="sortBy('ovr')">OVR${arrow('ovr')}</th>
      <th>G</th>
      <th class="${sorted('avg')}" onclick="sortBy('avg')">AVG${arrow('avg')}</th>
      <th>OBP</th><th>SLG</th>
      <th class="${sorted('hr')}" onclick="sortBy('hr')">HR${arrow('hr')}</th>
      <th class="${sorted('rbi')}" onclick="sortBy('rbi')">RBI${arrow('rbi')}</th>
      <th class="${sorted('salary')}" onclick="sortBy('salary')">Salary${arrow('salary')}</th>
    </tr>`;
    rows = players.map(pl => {
      if (pl.isPitcher) {
        const sp = seasonPitch(pl.id);
        return `<tr onclick="openModal(${pl.id})">
          <td class="player-name-cell">${pl.fn} ${pl.ln}</td>
          <td><span class="pos-badge">${pl.pos}</span></td>
          <td class="stat-num">${pl.age}</td>
          <td><span class="ovr-badge" style="background:${ovrColor(pl.ovr)}">${pl.ovr}</span></td>
          <td class="stat-num" colspan="5" style="text-align:center;color:var(--text-muted)">${sp ? sp.era.toFixed(2)+' ERA &bull; '+sp.w+'-'+sp.l+' &bull; '+sp.k+' K' : 'No starts yet'}</td>
          <td></td>
          <td class="salary-cell ${pl.contract.yrs<=1?'expiring':''}">${fmt$(pl.contract.salary)}</td>
        </tr>`;
      }
      const sb = seasonBat(pl.id);
      return `<tr onclick="openModal(${pl.id})">
        <td class="player-name-cell">${pl.fn} ${pl.ln}</td>

        <td class="stat-num">${sb ? sb.g : '0'}</td>
        <td class="stat-num">${sb ? fmtAvg(sb.avg) : '---'}</td>
        <td class="stat-num">${sb ? fmtAvg(sb.obp) : '---'}</td>
        <td class="stat-num">${sb ? fmtAvg(sb.slg) : '---'}</td>
        <td class="stat-num">${sb ? sb.hr : '0'}</td>
        <td class="stat-num">${sb ? sb.rbi : '0'}</td>
        <td class="salary-cell ${pl.contract.yrs<=1?'expiring':''}">${fmt$(pl.contract.salary)}</td>
      </tr>`;
    }).join('');
  }

  return `
    <div class="card">
      <div class="roster-controls">
        <div class="filter-group">
          ${filters.map(f => `<button class="filter-btn ${state.filter===f.id?'active':''}" onclick="filterRoster('${f.id}')">${f.label}</button>`).join('')}
        </div>
        <div class="roster-count">${players.length} players &bull; ${state.season.gamesPlayed > 0 ? state.season.gamesPlayed+' games played' : 'Season 2'}</div>
      </div>
      <div class="table-wrap">
        <table><thead>${headers}</thead><tbody>${rows}</tbody></table>
      </div>
    </div>
  `;
}

function sortBy(col) {
  if (state.sort.col === col) state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
  else { state.sort.col = col; state.sort.dir = col === 'name' || col === 'pos' ? 'asc' : 'desc'; }
  render();
}
function filterRoster(f) { state.filter = f; render(); }

// ════════════════════════ SCOUTING ════════════════════════

function getScoutLevel(prospectId) {
  return (state.scoutingData[prospectId] || {}).level || 0;
}

function getScoutDisplay(prospect) {
  const level = getScoutLevel(prospect.id);
  if (level >= 90) return { text: ''+prospect.trueOvr, color: ovrColor(prospect.trueOvr), exact: true, confidence: 'Locked In' };
  if (level <= 0) return { text: '??', color: '#999', exact: false, confidence: 'Unknown' };
  const blended = Math.round(prospect.scoutOvr + (prospect.trueOvr - prospect.scoutOvr) * (level / 100));
  const variance = Math.max(1, Math.round((1 - level/100) * 10));
  const lo = Math.max(35, blended - variance);
  const hi = Math.min(99, blended + variance);
  const conf = level >= 75 ? 'High' : level >= 50 ? 'Good' : level >= 25 ? 'Low' : 'Very Low';
  return { text: lo+'-'+hi, color: ovrColor(blended), exact: false, confidence: conf };
}

function advanceScouting() {
  state.scouts.forEach(scout => {
    if (scout.type === 'area') {
      if (!scout.assignedTo) return;
      if (!state.scoutingData[scout.assignedTo]) state.scoutingData[scout.assignedTo] = { level: 0 };
      const gain = (scout.skill / 100) * (1.2 + Math.random() * 1.3);
      state.scoutingData[scout.assignedTo].level = Math.min(100, state.scoutingData[scout.assignedTo].level + gain);
    } else if (scout.type === 'national') {
      if (!scout.covers) return;
      const targets = state.draftProspects.filter(pr => {
        if (scout.covers==='IF') return !pr.isPitcher&&['C','1B','2B','SS','3B'].includes(pr.pos);
        if (scout.covers==='OF') return !pr.isPitcher&&['LF','CF','RF'].includes(pr.pos);
        if (scout.covers==='SP') return pr.pos==='SP';
        if (scout.covers==='RP') return pr.isPitcher&&pr.pos!=='SP';
        return false;
      });
      const gain = (scout.skill / 100) * (0.4 + Math.random() * 0.4);
      targets.forEach(pr => {
        if (!state.scoutingData[pr.id]) state.scoutingData[pr.id] = { level: 0 };
        state.scoutingData[pr.id].level = Math.min(100, state.scoutingData[pr.id].level + gain);
      });
    } else if (scout.type === 'crosschecker') {
      if (!scout.assignedTo) return;
      if (!state.scoutingData[scout.assignedTo]) state.scoutingData[scout.assignedTo] = { level: 0 };
      const gain = (scout.skill / 100) * (2.8 + Math.random() * 1.5);
      state.scoutingData[scout.assignedTo].level = Math.min(100, state.scoutingData[scout.assignedTo].level + gain);
    }
  });
}

function assignScoutTo(scoutId, prospectId) {
  const scout = state.scouts.find(s => s.id === scoutId);
  if (scout) scout.assignedTo = prospectId;
  render();
}

function unassignScout(scoutId) {
  const scout = state.scouts.find(s => s.id === scoutId);
  if (!scout) return;
  if (scout.type === 'national') scout.covers = null;
  else scout.assignedTo = null;
  render();
}

function quickAssignScout(prospectId) {
  const avail = state.scouts.filter(s => s.type==='area' && s.assignedTo === null).sort((a,b) => b.skill - a.skill);
  if (avail.length) {
    avail[0].assignedTo = prospectId;
  } else {
    const area = state.scouts.filter(s=>s.type==='area').sort((a,b) => a.skill - b.skill);
    if (area.length) area[0].assignedTo = prospectId;
  }
  render();
}

function assignNational(scoutId, group) {
  const scout = state.scouts.find(s => s.id === scoutId);
  if (scout && scout.type === 'national') scout.covers = group;
  render();
}

function assignCrosschecker(prospectId) {
  const cc = state.scouts.find(s => s.type === 'crosschecker');
  if (cc) cc.assignedTo = prospectId;
  render();
}

function generateProspectTools(ovr, isPitcher, age) {
  function tg(base) { return Math.round(clamp(base + (Math.random()-0.5)*25, 20, 80) / 5) * 5; }
  const base = 20 + (ovr - 35) * 0.85;
  const names = isPitcher ? ['fastball','curveball','slider','changeup','command'] : ['contact','power','speed','arm','fielding'];
  const offsets = isPitcher ? [6,0,-2,-4,3] : [4,0,-2,-4,2];
  const tools = {}, scouted = {}, potential = {};
  names.forEach((name, i) => {
    const trueVal = tg(base + offsets[i]);
    tools[name] = trueVal;
    scouted[name] = Math.round(clamp(trueVal + (Math.random()-0.5)*30, 20, 80) / 5) * 5;
    potential[name] = Math.round(clamp(trueVal + (age <= 21 ? 5+Math.random()*15 : age <= 24 ? Math.random()*10 : Math.random()*5), 20, 80) / 5) * 5;
  });
  return { tools, scouted, potential };
}

function getToolGrade(prospect, toolName) {
  if (!prospect.tools || !prospect.tools[toolName]) return null;
  const level = getScoutLevel(prospect.id);
  if (level <= 0) return null;
  const trueVal = prospect.tools[toolName];
  const scoutedVal = prospect.scoutedTools[toolName];
  return Math.round(clamp(scoutedVal + (trueVal - scoutedVal) * (level / 100), 20, 80) / 5) * 5;
}

function getToolPotential(prospect, toolName) {
  if (!prospect.toolPotential || !prospect.toolPotential[toolName]) return null;
  const level = getScoutLevel(prospect.id);
  if (level < 30) return null;
  return prospect.toolPotential[toolName];
}

function gradeInfo(g) {
  if (g >= 80) return { label:'Elite', color:'#9b7a0a' };
  if (g >= 70) return { label:'Plus Plus', color:'#1a6b30' };
  if (g >= 60) return { label:'Plus', color:'#24774a' };
  if (g >= 55) return { label:'Above Avg', color:'#2a7ab5' };
  if (g >= 50) return { label:'Average', color:'#666' };
  if (g >= 45) return { label:'Below Avg', color:'#c46210' };
  if (g >= 40) return { label:'Fringe', color:'#b5342b' };
  return { label:'Poor', color:'#8b2020' };
}

function toolLabel(name) {
  return { contact:'Contact', power:'Power', speed:'Speed', arm:'Arm', fielding:'Fielding',
    fastball:'Fastball', curveball:'Curve', slider:'Slider', changeup:'Change', command:'Command' }[name] || name;
}

function renderToolBar(grade, potGrade) {
  if (grade === null) return `<div style="display:flex;align-items:center;gap:6px;height:20px"><span style="color:var(--text-light);font-size:0.78rem">Not scouted</span></div>`;
  const gi = gradeInfo(grade);
  const pct = ((grade - 20) / 60) * 100;
  const potPct = potGrade ? ((potGrade - 20) / 60) * 100 : null;
  return `<div style="display:flex;align-items:center;gap:6px">
    <div style="flex:1;height:7px;background:var(--bg-alt);border-radius:4px;overflow:hidden;position:relative">
      ${potGrade ? `<div style="position:absolute;height:100%;width:${potPct}%;background:${gi.color};opacity:0.2;border-radius:4px"></div>` : ''}
      <div style="position:relative;height:100%;width:${pct}%;background:${gi.color};border-radius:4px"></div>
    </div>
    <span style="font-family:var(--font-mono);font-weight:700;font-size:0.82rem;min-width:22px;text-align:right;color:${gi.color}">${grade}</span>
    ${potGrade && potGrade > grade ? `<span style="font-size:0.7rem;color:var(--text-muted)">&rarr;${potGrade}</span>` : ''}
  </div>`;
}

function openScoutReport(prospectId) {
  const pr = state.draftProspects.find(p => p.id === prospectId);
  if (!pr) return;
  const level = getScoutLevel(pr.id);
  const sd = getScoutDisplay(pr);
  const toolNames = pr.isPitcher ? ['fastball','curveball','slider','changeup','command'] : ['contact','power','speed','arm','fielding'];

  document.getElementById('modalCard').innerHTML = `
    <button class="modal-close" onclick="closeModal()">&#10005;</button>
    <div class="modal-header">
      <div class="modal-avatar"><div class="modal-initials">${pr.fn[0]}${pr.ln[0]}</div><div class="modal-jersey">#${pr.num}</div></div>
      <div>
        <div class="modal-name">${pr.fn} ${pr.ln}</div>
        <div class="modal-meta">${pr.pos} &bull; Age ${pr.age} &bull; ${pr.isPitcher?'Throws':'Bats'}: ${pr.bats}</div>
        <div class="modal-ratings">
          <span class="modal-rating-item"><span class="modal-rating-label">OVR </span><span class="ovr-badge" style="background:${sd.color};${sd.exact?'':'min-width:42px;font-size:0.72rem'}">${sd.text}</span></span>
          <span class="modal-rating-item"><span class="modal-rating-label">Potential </span><span class="potential-stars">${potStars(pr.pot)}</span></span>
        </div>
        <div style="margin-top:6px;font-size:0.78rem;color:var(--text-muted)">Scouting: ${Math.round(level)}% &bull; ${sd.confidence}</div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-section-title">${pr.isPitcher ? 'Pitch Arsenal' : 'Five Tools'} (20&ndash;80 Scale)</div>
      ${level > 0 ? `<div style="font-size:0.72rem;color:var(--text-muted);margin-bottom:10px">Grades refine as scouting progresses. Faded bar shows potential ceiling.</div>` : ''}
      ${toolNames.map(tn => {
        const grade = getToolGrade(pr, tn);
        const potG = getToolPotential(pr, tn);
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="width:62px;font-size:0.78rem;color:var(--text-muted);text-align:right">${toolLabel(tn)}</span>
          <div style="flex:1">${renderToolBar(grade, potG)}</div>
        </div>`;
      }).join('')}

      <div class="modal-section-title">Grade Scale</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;font-size:0.72rem">
        ${[{g:80,l:'Elite'},{g:70,l:'Plus Plus'},{g:60,l:'Plus'},{g:50,l:'Average'},{g:40,l:'Fringe'},{g:20,l:'Poor'}].map(x =>
          `<span style="padding:2px 6px;border-radius:3px;background:${gradeInfo(x.g).color};color:white">${x.g} ${x.l}</span>`
        ).join('')}
      </div>

      ${!state.scouts.some(s=>s.assignedTo===pr.id) ? `
        <div style="margin-top:16px;text-align:center">
          <button class="btn btn-navy" onclick="quickAssignScout(${pr.id});closeModal();render()">Assign Scout to ${pr.fn}</button>
        </div>
      ` : `<div style="margin-top:16px;text-align:center;font-size:0.85rem;color:var(--navy);font-weight:600">&#128269; Scout actively working this prospect</div>`}
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function generateDraftClass() {
  state.draftProspects = generateProspects(85);
  state.scoutingData = {};
  state.scouts.forEach(s => { s.assignedTo = null; if (s.type === 'national') s.covers = null; });
}

function renderScouting() {
  if (!state.draftProspects.length) {
    return `<div class="card"><div class="card-title">Scouting</div>
      <div style="text-align:center;padding:30px;color:var(--text-muted)">
        <div style="font-family:var(--font-serif);font-size:1.1rem;margin-bottom:8px">No Draft Class Available</div>
        <div>The upcoming draft class will be generated when the season starts. Play games to advance your scouting reports.</div>
      </div></div>`;
  }

  const sf = state.scoutFilter || 'all';
  let prospects = [...state.draftProspects].filter(pr => !pr.drafted);
  if (sf==='if') prospects = prospects.filter(p=>!p.isPitcher&&['C','1B','2B','SS','3B'].includes(p.pos));
  if (sf==='of') prospects = prospects.filter(p=>!p.isPitcher&&['LF','CF','RF'].includes(p.pos));
  if (sf==='sp') prospects = prospects.filter(p=>p.pos==='SP');
  if (sf==='rp') prospects = prospects.filter(p=>p.isPitcher&&p.pos!=='SP');

  const scoutedCount = Object.keys(state.scoutingData).filter(k => state.scoutingData[k].level > 0).length;
  const lockedCount = Object.keys(state.scoutingData).filter(k => state.scoutingData[k].level >= 90).length;

  const areaScouts = state.scouts.filter(s=>s.type==='area');
  const natScouts = state.scouts.filter(s=>s.type==='national');
  const crosschecker = state.scouts.find(s=>s.type==='crosschecker');
  const posGroups = [{id:'IF',l:'Infield'},{id:'OF',l:'Outfield'},{id:'SP',l:'Starters'},{id:'RP',l:'Relievers'}];

  function scoutRow(sc) {
    const assignedProspect = sc.assignedTo ? state.draftProspects.find(p => p.id === sc.assignedTo) : null;
    const lvl = sc.assignedTo ? getScoutLevel(sc.assignedTo) : 0;
    const colors = {area:'var(--navy)',national:'var(--green)',crosschecker:'var(--gold)'};
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-light)">
      <div style="width:36px;height:36px;border-radius:50%;background:${colors[sc.type]};color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-weight:700;font-size:0.82rem;flex-shrink:0">${sc.name.split(' ').map(w=>w[0]).join('')}</div>
      <div style="min-width:110px">
        <div style="font-family:var(--font-serif);font-weight:600;font-size:0.9rem">${sc.name}</div>
        <div style="font-size:0.72rem;color:var(--text-muted)">Skill ${sc.skill}/100</div>
      </div>
      ${sc.type==='national' ? `
        <div style="flex:1">
          ${sc.covers ? `<div style="font-size:0.85rem">Covering <b>all ${posGroups.find(g=>g.id===sc.covers).l}</b></div>
            <div style="font-size:0.72rem;color:var(--text-muted)">Scouting ${state.draftProspects.filter(pr=>{
              if(sc.covers==='IF')return !pr.isPitcher&&['C','1B','2B','SS','3B'].includes(pr.pos);
              if(sc.covers==='OF')return !pr.isPitcher&&['LF','CF','RF'].includes(pr.pos);
              if(sc.covers==='SP')return pr.pos==='SP';
              if(sc.covers==='RP')return pr.isPitcher&&pr.pos!=='SP';
            }).length} prospects at once (slower per player)</div>`
           : `<div style="display:flex;gap:4px;flex-wrap:wrap">
              ${posGroups.map(g=>`<button class="btn btn-outline" onclick="assignNational(${sc.id},'${g.id}')" style="padding:3px 8px;font-size:0.7rem">${g.l}</button>`).join('')}
            </div>`}
        </div>
        ${sc.covers ? `<button class="btn btn-outline" onclick="unassignScout(${sc.id})" style="padding:4px 10px;font-size:0.72rem">Change</button>` : ''}
      ` : `
        <div style="flex:1;font-size:0.85rem">
          ${assignedProspect ? `
            Scouting <b>${assignedProspect.fn} ${assignedProspect.ln}</b> (${assignedProspect.pos})
            <div style="margin-top:3px;height:6px;background:var(--bg-alt);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${lvl}%;background:${lvl>=90?'var(--green)':colors[sc.type]};border-radius:3px;transition:width 0.3s"></div>
            </div>
            <div style="font-size:0.72rem;color:var(--text-muted);margin-top:1px">${Math.round(lvl)}% complete${sc.type==='crosschecker'?' &bull; 2.5x speed':''}</div>
          ` : `<span style="color:var(--text-muted)">${sc.type==='crosschecker'?'Elite evaluator &mdash; 2.5x speed, assign to your top target':'Not assigned &mdash; select a prospect below'}</span>`}
        </div>
        ${assignedProspect ? `<button class="btn btn-outline" onclick="unassignScout(${sc.id})" style="padding:4px 10px;font-size:0.72rem">Unassign</button>` : ''}
      `}
    </div>`;
  }

  return `
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Scouting Staff</div>
      <div style="font-size:0.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--navy);margin:12px 0 6px">Area Scouts &mdash; Deep individual coverage</div>
      ${areaScouts.map(sc=>scoutRow(sc)).join('')}
      <div style="font-size:0.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--green);margin:16px 0 6px">National Scouts &mdash; Cover entire position groups</div>
      ${natScouts.map(sc=>scoutRow(sc)).join('')}
      <div style="font-size:0.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin:16px 0 6px">Crosschecker &mdash; Elite single-target evaluation</div>
      ${scoutRow(crosschecker)}
    </div>

    <div class="card">
      <div class="roster-controls">
        <div class="filter-group">
          ${[{id:'all',l:'All'},{id:'if',l:'Infield'},{id:'of',l:'Outfield'},{id:'sp',l:'Starters'},{id:'rp',l:'Relievers'}].map(f =>
            `<button class="filter-btn ${sf===f.id?'active':''}" onclick="state.scoutFilter='${f.id}';render()">${f.l}</button>`
          ).join('')}
        </div>
        <div class="roster-count">${scoutedCount} scouted &bull; ${lockedCount} locked in &bull; ${state.draftProspects.filter(p=>!p.drafted).length} total</div>
      </div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th style="cursor:default">Prospect</th><th style="cursor:default">Pos</th><th style="cursor:default">Age</th>
          <th style="cursor:default">OVR</th><th style="cursor:default">Confidence</th><th style="cursor:default">Pot</th><th style="cursor:default"></th>
        </tr></thead>
        <tbody>
          ${prospects.slice(0,40).map(pr => {
            const sd = getScoutDisplay(pr);
            const lvl = getScoutLevel(pr.id);
            const isArea = areaScouts.some(s => s.assignedTo === pr.id);
            const isCross = crosschecker.assignedTo === pr.id;
            const isActive = isArea || isCross;
            return `<tr style="cursor:default;${isCross?'background:#fdf6e3':isArea?'background:#f0f7ff':''}">
              <td class="player-name-cell">${pr.fn} ${pr.ln}</td>
              <td><span class="pos-badge">${pr.pos}</span></td>
              <td class="stat-num">${pr.age}</td>
              <td><span class="ovr-badge" style="background:${sd.color};${sd.exact?'':'min-width:42px;font-size:0.72rem'}">${sd.text}</span></td>
              <td style="font-size:0.78rem">
                <div style="display:flex;align-items:center;gap:6px">
                  <div style="width:50px;height:5px;background:var(--bg-alt);border-radius:3px;overflow:hidden">
                    <div style="height:100%;width:${lvl}%;background:${lvl>=90?'var(--green)':lvl>=50?'var(--gold)':'var(--navy)'};border-radius:3px"></div>
                  </div>
                  <span style="color:${lvl>=90?'var(--green)':lvl>=50?'var(--gold)':'var(--text-muted)'}">${sd.confidence}</span>
                </div>
              </td>
              <td><span class="potential-stars" style="font-size:0.75rem">${potStars(pr.pot)}</span></td>
              <td style="white-space:nowrap">
                ${isCross ? `<span style="font-size:0.7rem;color:var(--gold);font-weight:600">&#9733; Crosscheck</span>`
                  : isArea ? `<span style="font-size:0.7rem;color:var(--navy);font-weight:600">&#128269; Area</span>`
                  : `<button class="btn btn-outline" onclick="quickAssignScout(${pr.id})" style="padding:3px 7px;font-size:0.68rem">Area</button>
                     <button class="btn btn-outline" onclick="assignCrosschecker(${pr.id})" style="padding:3px 7px;font-size:0.68rem;border-color:var(--gold);color:var(--gold)">&#9733;</button>`}
                ${lvl > 0 ? ` <button class="btn btn-outline" onclick="openScoutReport(${pr.id})" style="padding:3px 7px;font-size:0.68rem;margin-left:2px">Report</button>` : ''}
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>
    </div>
  `;
}

// ════════════════════════ LINEUP ════════════════════════
function renderLineup() {
  const lineupPlayers = state.lineup.map(id => id ? p(id) : null);
  const posPlayerIds = PLAYERS.filter(x => !x.isPitcher).map(x => x.id);
  const available = posPlayerIds.filter(id => !state.lineup.includes(id)).map(id => p(id));

  const avgStats = lineupPlayers.filter(Boolean).reduce((acc, pl) => {
    const sb = seasonBat(pl.id);
    if (sb) { acc.avg += sb.avg; acc.obp += sb.obp; acc.slg += sb.slg; acc.n++; }
    return acc;
  }, { avg:0, obp:0, slg:0, n:0 });
  const n = avgStats.n || 1;

  const positions = ['C','1B','2B','SS','3B','LF','CF','RF','DH'];

  return `
    <div class="split-layout">
      <div class="lineup-card-wrap">
        <div class="card">
          <div class="section-header">
            <div class="card-title" style="margin:0;padding:0;border:none">Starting Lineup</div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-outline" onclick="autoLineup()">Auto-Fill Best</button>
              <button class="btn btn-outline" onclick="clearLineup()">Clear</button>
            </div>
          </div>
          ${state.lineup.map((id, i) => {
            const pl = id ? p(id) : null;
            if (pl) {
              const sb = seasonBat(pl.id);
              return `<div class="lineup-slot">
                <span class="slot-num">${i+1}.</span>
                <span class="slot-pos">${pl.pos}</span>
                <span class="slot-name">${pl.fn} ${pl.ln}</span>
                <span class="slot-stat">${sb ? fmtAvg(sb.avg)+' &bull; '+sb.hr+' HR' : 'No games'}</span>
                <span class="ovr-badge" style="background:${ovrColor(pl.ovr)};font-size:0.7rem;width:28px;height:20px">${pl.ovr}</span>
                <div class="slot-actions">
                  ${i > 0 ? `<button class="slot-btn" onclick="moveLineup(${i},-1)" title="Move up">&#9650;</button>` : ''}
                  ${i < 8 ? `<button class="slot-btn" onclick="moveLineup(${i},1)" title="Move down">&#9660;</button>` : ''}
                  <button class="slot-btn remove" onclick="removeFromLineup(${i})" title="Remove">&#10005;</button>
                </div>
              </div>`;
            }
            return `<div class="lineup-slot empty" onclick="showAvailableForSlot(${i})">
              <span class="slot-num">${i+1}.</span>
              <span class="slot-pos" style="color:var(--text-light)">---</span>
              <span class="slot-name" style="color:var(--text-light);font-family:var(--font-sans);font-weight:400">Click to add player</span>
            </div>`;
          }).join('')}
          <div class="lineup-summary">
            <div><span>Team AVG</span><b>${n > 0 ? fmtAvg(avgStats.avg/n) : '---'}</b></div>
            <div><span>Team OBP</span><b>${n > 0 ? fmtAvg(avgStats.obp/n) : '---'}</b></div>
            <div><span>Team SLG</span><b>${n > 0 ? fmtAvg(avgStats.slg/n) : '---'}</b></div>
            <div><span>Team OPS</span><b>${n > 0 ? fmtAvg((avgStats.obp+avgStats.slg)/n) : '---'}</b></div>
          </div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-title">Available Players</div>
          ${available.length ? `<div class="avail-list">
            ${available.map(pl => `
              <div class="avail-player" onclick="addToLineup(${pl.id})">
                <div class="avail-plus">+</div>
                <div style="flex:1">
                  <div class="avail-name">${pl.fn} ${pl.ln}</div>
                  <div style="font-size:0.78rem;color:var(--text-muted)">${pl.pos}${pl.pos2 ? '/'+pl.pos2 : ''} &bull; Age ${pl.age}</div>
                </div>
                <div style="text-align:right">
                  ${(() => { const sb = seasonBat(pl.id); return sb ? `<div class="avail-stat">${fmtAvg(sb.avg)}</div><div style="font-size:0.72rem;color:var(--text-muted)">${sb.hr} HR</div>` : `<div class="avail-stat">---</div>`; })()}
                </div>
                <span class="ovr-badge" style="background:${ovrColor(pl.ovr)};font-size:0.7rem;width:28px;height:20px">${pl.ovr}</span>
              </div>
            `).join('')}
          </div>` : `<div style="text-align:center;padding:20px;color:var(--text-muted)">All position players assigned</div>`}
        </div>
      </div>
    </div>
  `;
}

function addToLineup(playerId) {
  const emptyIdx = state.lineup.indexOf(null);
  if (emptyIdx === -1) {
    const idx = state.lineup.findIndex(id => id === null || id === undefined);
    if (idx === -1) return;
    state.lineup[idx] = playerId;
  } else {
    state.lineup[emptyIdx] = playerId;
  }
  render();
}
function removeFromLineup(idx) { state.lineup[idx] = null; render(); }
function moveLineup(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx > 8) return;
  [state.lineup[idx], state.lineup[newIdx]] = [state.lineup[newIdx], state.lineup[idx]];
  render();
}
function clearLineup() { state.lineup = [null,null,null,null,null,null,null,null,null]; render(); }
function autoLineup() {
  const batters = PLAYERS.filter(x => !x.isPitcher).sort((a,b) => b.ovr - a.ovr);
  state.lineup = batters.slice(0,9).map(x => x.id);
  render();
}

// ════════════════════════ ROTATION ════════════════════════
function renderRotation() {
  const starters = state.rotation.map(id => id ? p(id) : null);
  const bpRoles = state.bullpen;
  const allAssigned = [...state.rotation, bpRoles.closer, bpRoles.setup, ...bpRoles.middle, ...bpRoles.long].filter(Boolean);
  const availPitchers = PLAYERS.filter(x => x.isPitcher && !allAssigned.includes(x.id));

  function pitcherSlot(id, label, removeAction) {
    const pl = id ? p(id) : null;
    if (pl) {
      const sp = seasonPitch(pl.id);
      return `<div class="lineup-slot">
        <span class="slot-pos" style="min-width:28px;font-weight:700;color:var(--navy)">${label}</span>
        <span class="slot-name">${pl.fn} ${pl.ln}</span>
        <span class="slot-stat">${sp ? sp.era.toFixed(2)+' ERA &bull; '+sp.k+' K' : 'No appearances'}</span>
        <span class="ovr-badge" style="background:${ovrColor(pl.ovr)};font-size:0.7rem;width:28px;height:20px">${pl.ovr}</span>
        <button class="slot-btn remove" onclick="${removeAction}" title="Remove">&#10005;</button>
      </div>`;
    }
    return `<div class="lineup-slot empty"><span class="slot-pos" style="min-width:28px">${label}</span><span style="color:var(--text-light)">Empty</span></div>`;
  }

  return `
    <div class="split-layout">
      <div>
        <div class="card lineup-card-wrap" style="position:relative;overflow:hidden">
          <div style="position:absolute;top:0;left:0;width:5px;height:100%;background:var(--navy)"></div>
          <div class="card-title">Starting Rotation</div>
          ${starters.map((pl, i) => {
            if (pl) {
              const sp = seasonPitch(pl.id);
              return `<div class="lineup-slot">
              <span class="slot-num" style="min-width:28px">SP${i+1}</span>
              <span class="slot-name">${pl.fn} ${pl.ln}</span>
              <span class="slot-stat">${sp ? sp.era.toFixed(2)+' ERA &bull; '+sp.w+'-'+sp.l+' &bull; '+sp.k+' K' : 'No starts'}</span>
              <span class="ovr-badge" style="background:${ovrColor(pl.ovr)};font-size:0.7rem;width:28px;height:20px">${pl.ovr}</span>
              <div class="slot-actions">
                ${i > 0 ? `<button class="slot-btn" onclick="moveRotation(${i},-1)">&#9650;</button>` : ''}
                ${i < 4 ? `<button class="slot-btn" onclick="moveRotation(${i},1)">&#9660;</button>` : ''}
                <button class="slot-btn remove" onclick="removeFromRotation(${i})">&#10005;</button>
              </div>
            </div>`;
            }
            return `<div class="lineup-slot empty"><span class="slot-num">SP${i+1}</span><span style="color:var(--text-light)">Empty</span></div>`;
          }).join('')}
        </div>

        <div class="card rotation-section" style="margin-top:16px">
          <div class="card-title">Bullpen</div>
          <div class="role-label">Closer</div>
          ${pitcherSlot(bpRoles.closer, 'CL', `removeBullpen('closer')`)}
          <div class="role-label">Setup</div>
          ${pitcherSlot(bpRoles.setup, 'SU', `removeBullpen('setup')`)}
          <div class="role-label">Middle Relief</div>
          ${bpRoles.middle.map((id,i) => pitcherSlot(id, 'MR', `removeBullpenArr('middle',${i})`)).join('')}
          <div class="role-label">Long Relief</div>
          ${bpRoles.long.map((id,i) => pitcherSlot(id, 'LR', `removeBullpenArr('long',${i})`)).join('')}
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-title">Available Pitchers</div>
          ${availPitchers.length ? `<div class="avail-list">
            ${availPitchers.map(pl => `
              <div class="avail-player" onclick="assignPitcher(${pl.id})">
                <div class="avail-plus">+</div>
                <div style="flex:1">
                  <div class="avail-name">${pl.fn} ${pl.ln}</div>
                  <div style="font-size:0.78rem;color:var(--text-muted)">${pl.pos} &bull; Age ${pl.age}</div>
                </div>
                <div style="text-align:right">
                  ${(() => { const sp = seasonPitch(pl.id); return sp ? `<div class="avail-stat">${sp.era.toFixed(2)} ERA</div><div style="font-size:0.72rem;color:var(--text-muted)">${sp.k} K</div>` : `<div class="avail-stat">---</div>`; })()}

              </div>
            `).join('')}

      </div>
    </div>
  `;
}

function removeFromRotation(i) { state.rotation[i] = null; render(); }
function moveRotation(i, dir) {
  const ni = i + dir;
  [state.rotation[i], state.rotation[ni]] = [state.rotation[ni], state.rotation[i]];
  render();
}
function removeBullpen(role) { state.bullpen[role] = null; render(); }
function removeBullpenArr(role, i) { state.bullpen[role][i] = null; render(); }

function assignPitcher(id) {
  const emptyRot = state.rotation.indexOf(null);
  if (emptyRot !== -1) { state.rotation[emptyRot] = id; render(); return; }
  if (!state.bullpen.closer) { state.bullpen.closer = id; render(); return; }
  if (!state.bullpen.setup) { state.bullpen.setup = id; render(); return; }
  const emptyMid = state.bullpen.middle.indexOf(null);
  if (emptyMid !== -1) { state.bullpen.middle[emptyMid] = id; render(); return; }
  const emptyLong = state.bullpen.long.indexOf(null);
  if (emptyLong !== -1) { state.bullpen.long[emptyLong] = id; render(); return; }
  render();
}

function initPayrollChart() {
  const canvas = document.getElementById('payrollChart');
  if (!canvas) return;

  const groups = {};
  PLAYERS.forEach(pl => {
    const key = pl.isPitcher ? (pl.pos === 'SP' ? 'Starters' : pl.pos === 'CL' ? 'Closer' : pl.pos === 'SU' ? 'Setup' : 'Bullpen') : (['C','1B','2B','SS','3B'].includes(pl.pos) ? 'Infield' : ['LF','CF','RF','OF'].includes(pl.pos) ? 'Outfield' : 'DH/Util');
    groups[key] = (groups[key] || 0) + pl.contract.salary;
  });

  const labels = Object.keys(groups);
  const data = Object.values(groups);
  const colors = ['#1b2a4a','#2a5a3a','#b5342b','#c8960c','#5a4a8a','#c46210','#2a6a8a'];

  payrollChart = new Chart(canvas, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors.slice(0, labels.length), borderWidth: 2, borderColor: '#f9f5eb' }] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '55%',
      plugins: {
        legend: { position: 'bottom', labels: { padding: 12, usePointStyle: true, pointStyle: 'circle', font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${fmt$(ctx.raw)}` } }
      }
    }
  });
}

function generateLeagueCandidate(type, teamPool) {
  const team = teamPool[Math.floor(Math.random()*teamPool.length)];
  const nm = randomFullName();
  const str = team.str || 75;
  if (type === 'mvp') {
    const q = (str + Math.random()*15) / 100;
    const avg = clamp(0.260 + q*0.08 + (Math.random()-0.5)*0.025, 0.270, 0.340);
    const hr = Math.round(25 + q*25 + (Math.random()-0.5)*10);
    const rbi = Math.round(70 + q*50 + (Math.random()-0.5)*15);
    const obp = clamp(avg + 0.06 + Math.random()*0.04, 0.330, 0.440);
    const slg = clamp(avg + 0.15 + q*0.12, 0.420, 0.650);
    return { name:nm.fn+' '+nm.ln, team:team.name, avg, hr, rbi, obp, slg, ops:obp+slg, type:'bat' };
  } else if (type === 'cy') {
    const q = (str + Math.random()*15) / 100;
    const era = clamp(3.8 - q*2.0 + (Math.random()-0.5)*0.5, 1.8, 3.5);
    const w = Math.round(10 + q*10 + (Math.random()-0.5)*3);
    const l = Math.round(12 - q*6 + (Math.random()-0.5)*2);
    const k = Math.round(140 + q*80 + (Math.random()-0.5)*20);
    return { name:nm.fn+' '+nm.ln, team:team.name, era, w, l, k, type:'pitch' };
  } else {
    const nm2 = randomFullName();
    const age = 21 + Math.floor(Math.random()*3);
    if (Math.random() < 0.5) {
      const avg = clamp(0.250 + Math.random()*0.06, 0.250, 0.310);
      const hr = Math.round(12 + Math.random()*18);
      return { name:nm2.fn+' '+nm2.ln, team:team.name, age, avg, hr, ops: avg+0.06+avg+0.12+Math.random()*0.08, type:'bat' };
    } else {
      const era = clamp(3.0 + Math.random()*1.5, 2.5, 4.5);
      const k = Math.round(100 + Math.random()*80);
      return { name:nm2.fn+' '+nm2.ln, team:team.name, age, era, k, type:'pitch' };
    }
  }
}

function calculateAwards() {
  const batters = PLAYERS.filter(x => !x.isPitcher).map(pl => {
    const sb = seasonBat(pl.id);
    return { pl, sb, war: seasonWar(pl) };
  }).filter(x => x.sb && x.sb.ab >= 200);

  const pitchers = PLAYERS.filter(x => x.isPitcher).map(pl => {
    const sp = seasonPitch(pl.id);
    return { pl, sp, war: seasonWar(pl) };
  }).filter(x => x.sp && x.sp.ip >= 50);

  const teamMvp = [...batters].sort((a,b) => (b.sb?b.sb.obp+b.sb.slg:0) - (a.sb?a.sb.obp+a.sb.slg:0))[0] || null;
  const teamCy = pitchers.filter(x=>x.sp&&x.sp.ip>=80).sort((a,b) => a.sp.era - b.sp.era)[0] || null;

  const rookies = batters.filter(x => x.pl.age <= 25 && x.pl.traits.some(t=>t==='Draft Pick'||t==='Minor Leaguer'||t==='Prospect'));
  const rookiePitchers = pitchers.filter(x => x.pl.age <= 25 && x.pl.traits.some(t=>t==='Draft Pick'||t==='Minor Leaguer'||t==='Prospect'));
  const allRookies = [...rookies.map(r=>({...r,type:'bat'})), ...rookiePitchers.map(r=>({...r,type:'pitch'}))];
  const teamRoy = allRookies.sort((a,b) => b.war - a.war)[0] || null;

  const strongTeams = OPPONENTS.filter(o => o.str >= 78);
  const leagueMvps = Array.from({length:3}, () => generateLeagueCandidate('mvp', strongTeams));
  const leagueCys = Array.from({length:3}, () => generateLeagueCandidate('cy', strongTeams));
  const leagueRoys = Array.from({length:2}, () => generateLeagueCandidate('roy', OPPONENTS));

  let mvp, cyYoung, roy;
  const userMvpOps = teamMvp && teamMvp.sb ? teamMvp.sb.obp + teamMvp.sb.slg : 0;
  const bestLeagueMvp = leagueMvps.sort((a,b) => b.ops - a.ops)[0];
  if (teamMvp && userMvpOps >= bestLeagueMvp.ops) {
    mvp = { name:teamMvp.pl.fn+' '+teamMvp.pl.ln, team:'Chicago Herons', isUser:true, stats:fmtAvg(teamMvp.sb.avg)+' / '+teamMvp.sb.hr+' HR / '+teamMvp.sb.rbi+' RBI', pl:teamMvp.pl, sb:teamMvp.sb };
  } else {
    mvp = { name:bestLeagueMvp.name, team:bestLeagueMvp.team, isUser:false, stats:fmtAvg(bestLeagueMvp.avg)+' / '+bestLeagueMvp.hr+' HR / '+bestLeagueMvp.rbi+' RBI' };
  }

  const userCyEra = teamCy && teamCy.sp ? teamCy.sp.era : 99;
  const bestLeagueCy = leagueCys.sort((a,b) => a.era - b.era)[0];
  if (teamCy && userCyEra <= bestLeagueCy.era) {
    cyYoung = { name:teamCy.pl.fn+' '+teamCy.pl.ln, team:'Chicago Herons', isUser:true, stats:teamCy.sp.era.toFixed(2)+' ERA / '+teamCy.sp.w+'-'+teamCy.sp.l+' / '+teamCy.sp.k+' K', pl:teamCy.pl, sp:teamCy.sp };
  } else {
    cyYoung = { name:bestLeagueCy.name, team:bestLeagueCy.team, isUser:false, stats:bestLeagueCy.era.toFixed(2)+' ERA / '+bestLeagueCy.w+'-'+bestLeagueCy.l+' / '+bestLeagueCy.k+' K' };
  }

  const bestLeagueRoy = leagueRoys[0];
  const userRoyWar = teamRoy ? teamRoy.war : -1;
  const leagueRoyScore = bestLeagueRoy.type==='bat' ? (bestLeagueRoy.ops||0.700)*3 : (5-bestLeagueRoy.era)*1.2;
  if (teamRoy && userRoyWar >= leagueRoyScore) {
    roy = { name:teamRoy.pl.fn+' '+teamRoy.pl.ln, team:'Chicago Herons', isUser:true, stats:teamRoy.type==='bat'?fmtAvg(teamRoy.sb.avg)+' / '+teamRoy.sb.hr+' HR':'', pl:teamRoy.pl };
  } else if (bestLeagueRoy) {
    roy = { name:bestLeagueRoy.name, team:bestLeagueRoy.team, isUser:false, stats:bestLeagueRoy.type==='bat'?fmtAvg(bestLeagueRoy.avg)+' / '+bestLeagueRoy.hr+' HR':bestLeagueRoy.era.toFixed(2)+' ERA / '+bestLeagueRoy.k+' K' };
  } else { roy = null; }

  const hrLeader = [...batters].sort((a,b) => (b.sb?b.sb.hr:0) - (a.sb?a.sb.hr:0))[0] || null;
  const avgLeader = [...batters].filter(x=>x.sb&&x.sb.ab>=300).sort((a,b) => (b.sb?b.sb.avg:0) - (a.sb?a.sb.avg:0))[0] || null;
  const kLeader = [...pitchers].sort((a,b) => (b.sp?b.sp.k:0) - (a.sp?a.sp.k:0))[0] || null;

  state.awards = { mvp, cyYoung, roy, hrLeader, avgLeader, kLeader, teamMvp, teamCy, teamRoy };
  return state.awards;
}

function getPlayoffResult() {
  const po = state.playoffs;
  if (!po || po.round !== 'done') return 'Season in progress';
  if (!po.userMade) return 'Missed Playoffs';
  if (po.wsChamp && po.wsChamp.isUser) return 'Won World Series';
  if (po.ws && (po.ws.t1.isUser || po.ws.t2.isUser)) return 'Lost World Series';
  if (po.alcs && (po.alcs.t1.isUser || po.alcs.t2.isUser)) return 'Lost ALCS';
  if (po.ds && po.ds.some(s=>s.t1.isUser||s.t2.isUser)) return 'Lost ALDS';
  if (po.wc && po.wc.some(s=>s.t1.isUser||s.t2.isUser)) return 'Lost Wild Card';
  return 'Missed Playoffs';
}

// ════════════════════════ FATIGUE ════════════════════════

function updateFatigue(result) {
  result.userLU.forEach(pl => {
    if (!state.fatigue[pl.id]) state.fatigue[pl.id] = 0;
    state.fatigue[pl.id]++;
  });
}

function applyFatigueRests() {
  const restThreshold = 15 + Math.floor(Math.random()*6);
  const posPlayers = PLAYERS.filter(x => !x.isPitcher);
  const inLineup = new Set(state.lineup.filter(Boolean));
  const bench = posPlayers.filter(x => !inLineup.has(x.id));

  for (let i = 0; i < 9; i++) {
    const id = state.lineup[i];
    if (!id) continue;
    const fatigue = state.fatigue[id] || 0;
    if (fatigue >= restThreshold && bench.length) {
      const sub = bench.shift();
      state.lineup[i] = sub.id;
      state.fatigue[id] = 0;
      if (!state.fatigue[sub.id]) state.fatigue[sub.id] = 0;
    }
  }
}

function restoreStarters() {
  const origLineup = [7,4,6,2,8,9,5,1,3];
  for (let i = 0; i < 9; i++) {
    const origId = origLineup[i];
    if (!origId) continue;
    const pl = p(origId);
    if (!pl) continue;
    const currentIdx = state.lineup.indexOf(origId);
    if (currentIdx === -1 && !state.lineup.includes(origId)) {
      const benchSlot = state.lineup.findIndex((id, idx) => {
        if (!id) return false;
        const player = p(id);
        return player && player.traits.some(t => t==='Backup'||t==='Minor Leaguer'||t==='Utility');
      });
      if (benchSlot !== -1) state.lineup[benchSlot] = origId;
    }
  }
}

function simToEnd() {
  if (!confirm('Simulate the rest of the season?')) return;
  while (state.season.gamesPlayed < 162) {
    const game = state.season.schedule[state.season.gamesPlayed];
    const result = simulateGame(game);
    if (!result) break;
    recordGame(result);
  }
  state.season.lastBox = state.season.results.length ? state.season.results[0] : null;
  updateHeader();
  render();
}

function removePlayerFromAssignments(id) {
  state.lineup = state.lineup.map(x => x === id ? null : x);
  state.rotation = state.rotation.map(x => x === id ? null : x);
  if (state.bullpen.closer === id) state.bullpen.closer = null;
  if (state.bullpen.setup === id) state.bullpen.setup = null;
  state.bullpen.middle = state.bullpen.middle.map(x => x === id ? null : x);
  state.bullpen.long = state.bullpen.long.map(x => x === id ? null : x);
}

function enterOffseason() {
  state.offseason = true;
  state.departedPlayers = [];
  state.newSignings = [];

  const rev = calculateRevenue();
  const cbt = calculateCBT();
  const tp = totalPayroll();
  const profit = rev - tp - cbt.amount;
  TEAM.treasury += profit;
  if (tp > TEAM.cbtThreshold) TEAM.cbtYearsOver++;
  else TEAM.cbtYearsOver = 0;
  state.lastFinancials = { revenue: rev, payroll: tp, cbt: cbt.amount, cbtRate: cbt.rate, profit, treasury: TEAM.treasury };

  saveSeasonToHistory();
  state.freeAgents = [];
  state.faFilter = 'all';

  const rosterChanges = [];
  PLAYERS.forEach(pl => {
    const oldOvr = pl.ovr;
    pl.age++;

    if (!pl.isPitcher) {
      if (pl.age >= 33) {
        pl.batting.avg = clamp(pl.batting.avg*0.97, 0.180, 0.350);
        pl.batting.obp = clamp(pl.batting.obp*0.97, 0.250, 0.430);
        pl.batting.slg = clamp(pl.batting.slg*0.96, 0.280, 0.650);
        pl.batting.hr = Math.max(1, Math.round(pl.batting.hr*0.90));
        pl.ovr = Math.max(40, pl.ovr - 2 - Math.floor(Math.random()*2));
      } else if (pl.age >= 30) {
        pl.batting.avg = clamp(pl.batting.avg*0.99, 0.180, 0.350);
        pl.batting.slg = clamp(pl.batting.slg*0.98, 0.280, 0.650);
        pl.ovr = Math.max(40, pl.ovr - Math.floor(Math.random()*2));
      } else if (pl.age <= 27 && pl.pot > pl.ovr) {
        const growth = Math.min(4, Math.floor((pl.pot - pl.ovr)*0.2));
        pl.ovr = Math.min(pl.pot, pl.ovr + growth);
        pl.batting.avg = clamp(pl.batting.avg*1.02, 0.180, 0.350);
        pl.batting.obp = clamp(pl.batting.obp*1.01, 0.250, 0.430);
        pl.batting.slg = clamp(pl.batting.slg*1.03, 0.280, 0.650);
        pl.batting.hr = Math.round(pl.batting.hr*1.08);
      }
    } else {
      if (pl.age >= 33) {
        pl.pitching.era = clamp(pl.pitching.era*1.08, 1.5, 7.0);
        pl.pitching.whip = clamp(pl.pitching.whip*1.05, 0.80, 2.0);
        pl.pitching.k = Math.max(10, Math.round(pl.pitching.k*0.92));
        pl.ovr = Math.max(40, pl.ovr - 2 - Math.floor(Math.random()*2));
      } else if (pl.age >= 30) {
        pl.pitching.era = clamp(pl.pitching.era*1.03, 1.5, 7.0);
        pl.ovr = Math.max(40, pl.ovr - Math.floor(Math.random()*2));
      } else if (pl.age <= 27 && pl.pot > pl.ovr) {
        const growth = Math.min(4, Math.floor((pl.pot - pl.ovr)*0.2));
        pl.ovr = Math.min(pl.pot, pl.ovr + growth);
        pl.pitching.era = clamp(pl.pitching.era*0.96, 1.5, 7.0);
        pl.pitching.k = Math.round(pl.pitching.k*1.06);
      }
    }
    if (pl.ovr !== oldOvr) rosterChanges.push({ name: pl.fn+' '+pl.ln, pos: pl.pos, oldOvr, newOvr: pl.ovr, age: pl.age });
  });

  const expiring = PLAYERS.filter(pl => pl.contract.yrs <= 1);
  expiring.forEach(pl => {
    state.departedPlayers.push({ fn:pl.fn, ln:pl.ln, pos:pl.pos, ovr:pl.ovr, salary:pl.contract.salary });
    removePlayerFromAssignments(pl.id);
    const idx = PLAYERS.findIndex(x => x.id === pl.id);
    if (idx !== -1) PLAYERS.splice(idx, 1);
    pl.contract = { salary:0, yrs:0, type:'Free Agent' };
    state.freeAgents.push(pl);
  });

  PLAYERS.forEach(pl => { if (pl.contract.yrs > 0) pl.contract.yrs--; });

  const tiers = [{t:'star',n:2},{t:'solid',n:4},{t:'role',n:6},{t:'budget',n:4}];
  tiers.forEach(({t,n}) => { for(let i=0;i<n;i++) state.freeAgents.push(generateFAPlayer(t)); });
  state.freeAgents.sort((a,b) => b.ovr - a.ovr);

  state.seasonNumber++;
  state.rosterChanges = rosterChanges;
  renderTabs();
  switchTab('play');
}
