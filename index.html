function randomFullName() {
  let r = Math.random(), cum = 0, g = NAME_GROUPS[0];
  for (const grp of NAME_GROUPS) { cum += grp.w; if (r < cum) { g = grp; break; } }
  return { fn: g.fn[Math.floor(Math.random()*g.fn.length)], ln: g.ln[Math.floor(Math.random()*g.ln.length)] };
}

function randomShortName() {
  const nm = randomFullName();
  return nm.fn[0] + '. ' + nm.ln;
}

function generateFAPlayer(tier) {
  const isPitcher = Math.random() < 0.4;
  let ovr, age;
  switch(tier) {
    case 'star': ovr = 84+Math.floor(Math.random()*8); age = 27+Math.floor(Math.random()*5); break;
    case 'solid': ovr = 74+Math.floor(Math.random()*10); age = 25+Math.floor(Math.random()*7); break;
    case 'role': ovr = 64+Math.floor(Math.random()*10); age = 24+Math.floor(Math.random()*9); break;
    default: ovr = 56+Math.floor(Math.random()*10); age = 23+Math.floor(Math.random()*12); break;
  }
  const pos = isPitcher ? (Math.random()<0.55?'SP':(Math.random()<0.4?'CL':'RP')) : ['C','1B','2B','SS','3B','LF','CF','RF'][Math.floor(Math.random()*8)];
  const pot = Math.min(99, ovr + (age<=27 ? Math.floor(Math.random()*10) : Math.floor(Math.random()*3)));
  const nm = randomFullName();

  const pl = {
    id: nextFAId++, fn:nm.fn, ln:nm.ln, num: 10+Math.floor(Math.random()*80), pos, pos2:null, age,
    bats: Math.random()<0.7?'R':(Math.random()<0.5?'L':'S'), throws: Math.random()<0.75?'R':'L',
    ovr, pot, isPitcher,
    contract: { salary:0, yrs:0, type:'Free Agent' },
    traits: tier==='star'?['All-Star']:tier==='solid'?['Veteran']:[]
  };

  if (isPitcher) {
    const q = ovr/100, isSP = pos==='SP';
    const ip = isSP ? Math.round(100+q*120+(Math.random()-0.5)*20) : Math.round(25+q*45);
    pl.pitching = {
      w: isSP?Math.round(3+q*15+(Math.random()-0.5)*3):Math.round(q*6),
      l: isSP?Math.round(14-q*8+(Math.random()-0.5)*3):Math.round(3-q*1.5),
      era: clamp(5.8-q*3.5+(Math.random()-0.5)*0.6, 1.8, 6.0),
      whip: clamp(1.7-q*0.8+(Math.random()-0.5)*0.12, 0.85, 1.65),
      k: Math.round(ip*(6+q*5)/9), bb: Math.round(ip*(4-q*2)/9), ip,

      hld: isSP?0:Math.round(q*15), g: isSP?Math.round(20+q*14):Math.round(30+q*40),
      gs: isSP?Math.round(20+q*14):0, hr: Math.round(ip*(1.3-q*0.5)/9)
    };
  } else {
    const q = ovr/100;
    const avg = clamp(0.180+q*0.13+(Math.random()-0.5)*0.02, 0.200, 0.330);
    const iso = 0.080+q*0.16+(Math.random()-0.5)*0.03;
    const g = Math.round(90+q*70+(Math.random()-0.5)*20);

      avg, obp: clamp(avg+0.05+Math.random()*0.03, 0.270, 0.430), slg: clamp(avg+iso, 0.320, 0.620),
      hr: Math.round(clamp(iso*g*3.6*0.08, 1, 50)), rbi: Math.round(20+q*80+Math.random()*15),
      r: Math.round(40+q*60+(Math.random()-0.5)*15), h, sb: Math.round(Math.max(0,(1-q*0.3)*12*Math.random())),
      bb: Math.round(15+q*55+(Math.random()-0.5)*10), so: Math.round(160-q*70+(Math.random()-0.5)*20), g
    };
  }
  return pl;
}

function marketValue(fa) {
  const base = Math.pow((fa.ovr - 45)/10, 2) * 2;
  const ageMod = fa.age<=28 ? 1.2 : fa.age<=31 ? 1.0 : fa.age<=33 ? 0.75 : 0.5;
  const salary = Math.round(base * ageMod * 100000) * 10;
  const years = fa.age<=27 ? 5 : fa.age<=30 ? 3 : fa.age<=33 ? 2 : 1;
  return { salary: Math.max(700000, salary), years: Math.max(1, years) };
}

function updateOfferDisplay() {

  document.getElementById('offerTotal').textContent = 'Total: '+fmt$(s*offerState.years*1000000);
  const newPayroll = totalPayroll() + s*1000000;
  const overCBT = newPayroll - TEAM.cbtThreshold;
  const el = document.getElementById('offerRemaining');
  if (overCBT > 0) {
    const taxCbt = calculateCBT(s*1000000);
    el.textContent = fmt$(overCBT)+' over CBT (tax: '+fmt$(taxCbt.amount)+')';
    el.style.color = 'var(--red)';
  } else {
    el.textContent = fmt$(Math.abs(overCBT))+' under luxury tax';
    el.style.color = 'var(--green)';
  }
}

function setOfferYears(y) {
  offerState.years = y;
  document.querySelectorAll('.yr-btn').forEach(b => b.classList.toggle('active', parseInt(b.textContent)===y));
  updateOfferDisplay();
}

function submitOffer() {
  const fa = state.freeAgents[offerState.faIdx];
  if (!fa) return;
  const mv = marketValue(fa);
  const offSalary = offerState.salary * 1000000;
  const salaryOk = offSalary / mv.salary >= 0.82;
  const yearsOk = offerState.years >= mv.years - 1;
  if (salaryOk && yearsOk) {
    const competitionChance = 0.08 + (fa.ovr - 55) * 0.004;
    if (Math.random() < competitionChance) {
      const teams = ['New York Emperors','Boston Tides','Houston Stallions','Los Angeles Surf','Detroit Wolves'];
      const rival = teams[Math.floor(Math.random()*teams.length)];
      state.freeAgents.splice(offerState.faIdx, 1);
      closeModal();
      render();
      setTimeout(()=>alert(fa.fn+' '+fa.ln+' signed with the '+rival+' — they matched your offer with a better deal.'),100);
      return;
    }
    fa.contract = { salary: Math.round(offSalary), yrs: offerState.years, type:'FA Deal' };
    PLAYERS.push(fa);
    state.freeAgents.splice(offerState.faIdx, 1);
    state.newSignings.push(fa);
    closeModal();
    render();
  } else {
    let msg = fa.fn+' '+fa.ln+' declined.';
    if (!salaryOk) msg += ' The salary is below their asking price.';
    if (!yearsOk) msg += ' They want a longer commitment.';
    document.getElementById('offerResult').innerHTML = `<div style="color:var(--red);margin-top:8px;font-weight:600">${msg}</div>`;
  }
}

function simOffseasonDay() {
  const n = Math.min(state.freeAgents.length, 1 + Math.floor(Math.random()*3));
  for (let i = 0; i < n; i++) {
    if (state.freeAgents.length <= 3) break;
    state.freeAgents.splice(Math.floor(Math.random()*state.freeAgents.length), 1);
  }
  render();
}

function generateMinorLeaguer(pos) {
  const isPitcher = ['SP','RP','CL','SU'].includes(pos);
  const ovr = 52 + Math.floor(Math.random()*12);
  const age = 22 + Math.floor(Math.random()*4);
  const pot = Math.min(99, ovr + 5 + Math.floor(Math.random()*15));
  const nm = randomFullName();
  const pl = {
    id: nextFAId++, fn:nm.fn, ln:nm.ln, num: 60+Math.floor(Math.random()*30), pos, pos2:null, age,
    bats: Math.random()<0.7?'R':'L', throws: Math.random()<0.75?'R':'L',
    ovr, pot, isPitcher,
    contract: { salary:720000, yrs:3, type:'Pre-Arb' },
    traits: ['Minor Leaguer']
  };
  if (isPitcher) {
    const q=ovr/100, isSP=pos==='SP';
    const ip=isSP?Math.round(80+q*100):Math.round(20+q*40);
    pl.pitching = { w:isSP?Math.round(q*12):Math.round(q*4), l:isSP?Math.round(10-q*4):Math.round(3-q),
      era:clamp(5.8-q*3+(Math.random()-0.5)*0.6,2.5,6.5), whip:clamp(1.7-q*0.7+(Math.random()-0.5)*0.12,0.95,1.70),
      k:Math.round(ip*(5+q*4)/9), bb:Math.round(ip*(4.5-q*2)/9), ip,
      sv:0, hld:0, g:isSP?Math.round(15+q*12):Math.round(20+q*30), gs:isSP?Math.round(15+q*12):0, hr:Math.round(ip*(1.4-q*0.4)/9) };
  } else {
    const q=ovr/100;
    const avg=clamp(0.190+q*0.11+(Math.random()-0.5)*0.02,0.200,0.290);
    const iso=0.070+q*0.12+(Math.random()-0.5)*0.02;
    const g=Math.round(80+q*60);
    pl.batting = { avg, obp:clamp(avg+0.04+Math.random()*0.03,0.260,0.370), slg:clamp(avg+iso,0.300,0.500),
      hr:Math.round(clamp(iso*g*3.6*0.06,1,20)), rbi:Math.round(15+q*50), r:Math.round(30+q*40),
      h:Math.round(avg*g*3.6), sb:Math.round(Math.random()*10), bb:Math.round(10+q*35),
      so:Math.round(170-q*60+(Math.random()-0.5)*20), g };
  }
  return pl;
}

function fillRosterGaps() {
  const posNeeded = ['C','1B','2B','SS','3B','LF','CF','RF','DH'];
  const pitchNeeded = ['SP','SP','SP','SP','SP','RP','RP','RP','RP','CL'];
  const callups = [];

  const currentPos = PLAYERS.filter(x=>!x.isPitcher).map(x=>x.pos);
  const currentPitch = PLAYERS.filter(x=>x.isPitcher);

  while (PLAYERS.filter(x=>!x.isPitcher).length < 13) {
    const missing = posNeeded.find(p => PLAYERS.filter(x=>!x.isPitcher&&x.pos===p).length < 1) || ['OF','IF','C'][Math.floor(Math.random()*3)];
    const ml = generateMinorLeaguer(missing);
    PLAYERS.push(ml);
    callups.push(ml);
  }

  while (PLAYERS.filter(x=>x.isPitcher).length < 12) {
    const spCount = PLAYERS.filter(x=>x.isPitcher&&(x.pos==='SP')).length;
    const needPos = spCount < 5 ? 'SP' : 'RP';
    const ml = generateMinorLeaguer(needPos);
    PLAYERS.push(ml);
    callups.push(ml);
  }

  const emptyLineup = state.lineup.filter(x=>x===null).length;
  if (emptyLineup > 0) {
    const inLineup = state.lineup.filter(Boolean);
    const avail = PLAYERS.filter(x=>!x.isPitcher&&!inLineup.includes(x.id)).sort((a,b)=>b.ovr-a.ovr);
    for (let i=0; i<9; i++) {
      if (!state.lineup[i] && avail.length) {
        state.lineup[i] = avail.shift().id;
      }
    }
  }

  const emptyRot = state.rotation.filter(x=>x===null).length;
  if (emptyRot > 0) {
    const inRot = state.rotation.filter(Boolean);
    const allAssigned = [...state.rotation, state.bullpen.closer, state.bullpen.setup, ...state.bullpen.middle, ...state.bullpen.long].filter(Boolean);
    const avail = PLAYERS.filter(x=>x.isPitcher&&x.pos==='SP'&&!allAssigned.includes(x.id)).sort((a,b)=>b.ovr-a.ovr);
    for (let i=0; i<5; i++) {
      if (!state.rotation[i] && avail.length) {
        state.rotation[i] = avail.shift().id;
      }
    }
  }

  const bpAssigned = [state.bullpen.closer, state.bullpen.setup, ...state.bullpen.middle, ...state.bullpen.long].filter(Boolean);
  const allAssigned2 = [...state.rotation.filter(Boolean), ...bpAssigned];
  const unassignedRP = PLAYERS.filter(x=>x.isPitcher&&!allAssigned2.includes(x.id)).sort((a,b)=>b.ovr-a.ovr);
  if (!state.bullpen.closer && unassignedRP.length) state.bullpen.closer = unassignedRP.shift().id;
  if (!state.bullpen.setup && unassignedRP.length) state.bullpen.setup = unassignedRP.shift().id;
  for (let i=0; i<state.bullpen.middle.length; i++) {
    if (!state.bullpen.middle[i] && unassignedRP.length) state.bullpen.middle[i] = unassignedRP.shift().id;
  }
  for (let i=0; i<state.bullpen.long.length; i++) {
    if (!state.bullpen.long[i] && unassignedRP.length) state.bullpen.long[i] = unassignedRP.shift().id;
  }

  return callups;
}

function startNewSeason() {
  const callups = fillRosterGaps();
  state.offseason = false;
  state.season = {
    gamesPlayed:0, wins:0, losses:0, schedule:generateSchedule(),
    results:[], lastBox:null, batting:{}, pitching:{}, rs:0, ra:0

  }
}

// ════════════════════════ DRAFT ════════════════════════

function beginDraft() {
  const order = getAllTeams().sort((a,b) => teamPct(a) - teamPct(b)).map(t => t.name);
  const userPos = order.indexOf('Chicago Herons');
  const rounds = 5;
  const totalPicks = rounds * order.length;
  const prospects = state.draftProspects.length ? state.draftProspects : generateProspects(totalPicks + 10);

  state.draftState = {
    order, rounds, currentPick: 0, totalPicks,
    prospects, picks: [], userPos,
    done: false, draftFilter: 'all'
  };
  state.offseason = false;
  renderTabs();
  render();
}

function generateProspects(count) {
  const prospects = [];
  const positions = ['C','1B','2B','SS','3B','LF','CF','RF','SP','SP','SP','RP'];
  for (let i = 0; i < count; i++) {
    const tier = i<12?'elite':i<30?'good':i<55?'mid':'late';
    let trueOvr, sv;
    switch(tier) {
      case 'elite': trueOvr=65+Math.floor(Math.random()*14); sv=5; break;
      case 'good': trueOvr=55+Math.floor(Math.random()*14); sv=7; break;
      case 'mid': trueOvr=45+Math.floor(Math.random()*14); sv=9; break;
      default: trueOvr=38+Math.floor(Math.random()*14); sv=11; break;
    }
    const scoutOvr = clamp(trueOvr + Math.round((Math.random()-0.5)*sv*2), 35, 92);
    const pot = clamp(trueOvr + 10 + Math.floor(Math.random()*16), 50, 99);
    const age = 18 + Math.floor(Math.random()*4);
    const pos = positions[Math.floor(Math.random()*positions.length)];
    const isPitcher = ['SP','RP','CL'].includes(pos);
    const toolData = generateProspectTools(trueOvr, isPitcher, age);
    const nm = randomFullName();
    prospects.push({
      id: 500 + state.seasonNumber*100 + i, fn: nm.fn,
      ln: nm.ln, num: 50+Math.floor(Math.random()*40),
      pos, pos2:null, age, isPitcher, scoutOvr, trueOvr, pot,
      bats: Math.random()<0.7?'R':'L', throws: Math.random()<0.75?'R':'L',
      drafted: false, draftedBy: null,
      tools: toolData.tools, scoutedTools: toolData.scouted, toolPotential: toolData.potential
    });
  }
  prospects.sort((a,b) => b.scoutOvr - a.scoutOvr);
  return prospects;
}

function createDraftedPlayer(prospect) {
  const ovr = prospect.trueOvr;
  const pl = {
    id: prospect.id, fn: prospect.fn, ln: prospect.ln, num: prospect.num,
    pos: prospect.pos, pos2: null, age: prospect.age,
    bats: prospect.bats, throws: prospect.throws,
    ovr, pot: prospect.pot, isPitcher: prospect.isPitcher,
    contract: { salary: 720000, yrs: 6, type: 'Pre-Arb' },
    traits: ['Draft Pick']
  };
  if (pl.isPitcher) {
    const q=ovr/100, isSP=pl.pos==='SP';
    const ip=isSP?Math.round(60+q*110):Math.round(15+q*40);
    pl.pitching = { w:isSP?Math.round(q*10):Math.round(q*3), l:isSP?Math.round(8-q*3):Math.round(2),
      era:clamp(6.0-q*3+(Math.random()-0.5)*0.6,2.5,6.5), whip:clamp(1.75-q*0.7+(Math.random()-0.5)*0.12,0.95,1.75),
      k:Math.round(ip*(5+q*4)/9), bb:Math.round(ip*(4.5-q*2)/9), ip, sv:0, hld:0,
      g:isSP?Math.round(12+q*12):Math.round(15+q*30), gs:isSP?Math.round(12+q*12):0, hr:Math.round(ip*(1.4-q*0.4)/9) };
  } else {
    const q=ovr/100;
    const avg=clamp(0.185+q*0.12+(Math.random()-0.5)*0.02,0.195,0.300);
    const iso=0.065+q*0.13+(Math.random()-0.5)*0.02;
    const g=Math.round(70+q*60);
    pl.batting = { avg, obp:clamp(avg+0.04+Math.random()*0.03,0.255,0.380), slg:clamp(avg+iso,0.290,0.520),
      hr:Math.round(clamp(iso*g*3.6*0.06,0,18)), rbi:Math.round(12+q*45), r:Math.round(25+q*35),
      h:Math.round(avg*g*3.6), sb:Math.round(Math.random()*12), bb:Math.round(8+q*30),
      so:Math.round(175-q*55+(Math.random()-0.5)*20), g };
  }
  return pl;
}

function getCurrentDraftTeam() {
  const ds = state.draftState;
  return ds.order[ds.currentPick % ds.order.length];
}

function isUserPick() {
  return getCurrentDraftTeam() === 'Chicago Herons';
}

function currentRound() {
  return Math.floor(state.draftState.currentPick / state.draftState.order.length) + 1;
}

function currentPickInRound() {
  return (state.draftState.currentPick % state.draftState.order.length) + 1;
}

function draftPlayer(prospectIdx) {
  const ds = state.draftState;
  if (!isUserPick() || ds.done) return;
  const prospect = ds.prospects[prospectIdx];
  if (prospect.drafted) return;

  prospect.drafted = true;
  prospect.draftedBy = 'Chicago Herons';
  const player = createDraftedPlayer(prospect);
  PLAYERS.push(player);
  ds.picks.push({ round:currentRound(), pick:currentPickInRound(), team:'Chicago Herons', prospect, revealed:true });
  ds.currentPick++;
  if (ds.currentPick >= ds.totalPicks) { ds.done = true; }
  render();
}

function autoPick() {
  const ds = state.draftState;
  const team = getCurrentDraftTeam();
  const available = ds.prospects.filter(p => !p.drafted);
  if (!available.length) { ds.done = true; return; }
  const pick = available[0];
  pick.drafted = true;
  pick.draftedBy = team;
  ds.picks.push({ round:currentRound(), pick:currentPickInRound(), team, prospect:pick, revealed:false });
  ds.currentPick++;
  if (ds.currentPick >= ds.totalPicks) ds.done = true;
}

function simToMyPick() {
  const ds = state.draftState;
  while (!ds.done && !isUserPick()) autoPick();
  render();
}

function simDraftRound() {
  const ds = state.draftState;
  const targetRound = currentRound();
  while (!ds.done && currentRound() === targetRound) {
    if (isUserPick()) { autoPick(); } else { autoPick(); }
  }
  render();
}

function autoPickUser() {
  if (!isUserPick()) return;
  const ds = state.draftState;
  const available = ds.prospects.filter(p => !p.drafted);
  if (!available.length) return;
  draftPlayer(ds.prospects.indexOf(available[0]));
}

function simEntireDraft() {
  const ds = state.draftState;
  while (!ds.done) {
    if (isUserPick()) autoPickUser(); else autoPick();
  }
  render();
}

function finishDraft() {
  state.draftState = null;
  startNewSeason();
}

function setDraftFilter(f) { state.draftState.draftFilter = f; render(); }

// ════════════════════════ SIMULATION ENGINE ════════════════════════

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function randomName() { return randomShortName(); }

function generateSchedule() {
  const games = [];
  let num = 1;
  while (num <= 162) {
    const opp = OPPONENTS[Math.floor(Math.random() * OPPONENTS.length)];
    const len = Math.random() < 0.3 ? 2 : Math.random() < 0.75 ? 3 : 4;
    const home = Math.random() < 0.5;
    for (let g = 0; g < len && num <= 162; g++) {
      games.push({ num: num++, opp, isHome: home });
    }
  }
  return games;
}

function genOppLineup(str) {
  return ['C','1B','2B','SS','3B','LF','CF','RF','DH'].map(pos => {
    const q = clamp((str + (Math.random()-0.5)*20) / 100, 0.55, 1.0);
    return {
      name: randomName(), pos,
      avg: clamp(0.200 + q*0.085 + (Math.random()-0.5)*0.025, 0.195, 0.325),
      kRate: clamp(0.28 - q*0.08 + (Math.random()-0.5)*0.04, 0.10, 0.32),
      bbRate: clamp(0.05 + q*0.06 + (Math.random()-0.5)*0.02, 0.04, 0.14),
      hrPct: clamp(0.03 + q*0.12 + (Math.random()-0.5)*0.03, 0.02, 0.18)
    };
  });
}

function genOppPitcher(str) {
  const q = str / 100;
  return {
    name: randomName(),
    era: clamp(5.5 - q*3.0 + (Math.random()-0.5)*1.2, 2.2, 5.8),
    kPer9: clamp(5 + q*5.5 + (Math.random()-0.5)*2, 4.5, 12),
    bbPer9: clamp(4.5 - q*2.5 + (Math.random()-0.5)*1, 1.2, 5.5)
  };
}

function simAtBat(batter, pitcher, isUserBat) {
  let kR, bbR, hitR, hrP;
  if (isUserBat) {
    const pa = Math.max(batter.batting.g * 3.8, 1);
    kR = batter.batting.so / pa;
    bbR = batter.batting.bb / pa;
    hitR = batter.batting.avg;
    hrP = batter.batting.hr / Math.max(batter.batting.h, 1);
    const pm = 1 - (4.00 - pitcher.era) * 0.035;
    hitR *= clamp(pm, 0.7, 1.3);
    kR *= clamp(1 + (pitcher.kPer9 - 8) * 0.022, 0.75, 1.3);
  } else {
    kR = batter.kRate;
    bbR = batter.bbRate;
    hitR = batter.avg;
    hrP = batter.hrPct;
    const kp9 = pitcher.pitching.k / Math.max(pitcher.pitching.ip, 1) * 9;
    const pm = 1 - (4.00 - pitcher.pitching.era) * 0.035;
    hitR *= clamp(pm, 0.7, 1.3);
    kR *= clamp(1 + (kp9 - 8) * 0.022, 0.75, 1.3);
  }
  kR = clamp(kR, 0.08, 0.35);
  bbR = clamp(bbR, 0.04, 0.14);
  hitR = clamp(hitR, 0.18, 0.33);

  const r = Math.random();
  if (r < kR) return 'K';
  if (r < kR + bbR) return 'BB';
  if (r < kR + bbR + hitR) {
    const h = Math.random();
    if (h < hrP) return 'HR';
    if (h < hrP + 0.015) return '3B';
    if (h < hrP + 0.215) return '2B';
    return '1B';
  }
  return Math.random() < 0.45 ? 'GO' : (Math.random() < 0.6 ? 'FO' : 'LO');
}

function advRunners(bases, outcome, batterKey) {
  let scored = [];
  let b = [null, null, null];

  if (outcome === 'HR') {
    if (bases[2]) scored.push(bases[2]);
    if (bases[1]) scored.push(bases[1]);
    if (bases[0]) scored.push(bases[0]);
    scored.push(batterKey);
    return { scored, bases: b };
  }
  if (outcome === '3B') {
    if (bases[2]) scored.push(bases[2]);
    if (bases[1]) scored.push(bases[1]);
    if (bases[0]) scored.push(bases[0]);
    b[2] = batterKey;
    return { scored, bases: b };
  }
  if (outcome === '2B') {
    if (bases[2]) scored.push(bases[2]);
    if (bases[1]) scored.push(bases[1]);
    if (bases[0]) { Math.random() < 0.6 ? scored.push(bases[0]) : (b[2] = bases[0]); }
    b[1] = batterKey;
    return { scored, bases: b };
  }
  if (outcome === '1B') {
    if (bases[2]) scored.push(bases[2]);
    if (bases[1]) { Math.random() < 0.55 ? scored.push(bases[1]) : (b[2] = bases[1]); }
    if (bases[0]) b[1] = bases[0];
    b[0] = batterKey;
    return { scored, bases: b };
  }
  if (outcome === 'BB') {
    b[2] = bases[2]; b[1] = bases[1];
    if (bases[0]) {
      if (bases[1]) {
        if (bases[2]) scored.push(bases[2]);
        b[2] = bases[1];
      }
      b[1] = bases[0];
    }
    b[0] = batterKey;
    return { scored, bases: b };
  }
  return { scored: [], bases: [bases[0], bases[1], bases[2]] };
}

function simHalf(batters, pitcher, startIdx, isUserBat) {
  let outs = 0, runs = 0, hits = 0, idx = startIdx;
  let bases = [null, null, null];
  const bs = {};

  while (outs < 3) {
    const bi = idx % batters.length;
    const batter = batters[bi];
    const key = isUserBat ? batter.id : bi;
    if (!bs[key]) bs[key] = { ab:0, h:0, r:0, rbi:0, bb:0, so:0, hr:0, d:0, t:0 };

    const res = simAtBat(batter, pitcher, isUserBat);

    if (res === 'K') {
      outs++; bs[key].ab++; bs[key].so++;
    } else if (res === 'BB') {
      const adv = advRunners(bases, 'BB', key);
      runs += adv.scored.length; bases = adv.bases;
      bs[key].bb++; bs[key].rbi += adv.scored.length;
      adv.scored.forEach(k => { if (bs[k]) bs[k].r++; });
    } else if (res === 'GO' || res === 'FO' || res === 'LO') {
      bs[key].ab++; outs++;
      if (res === 'GO' && bases[0] && outs < 3 && Math.random() < 0.12) {
        outs++; bases[0] = null;
      }
      if (res === 'FO' && bases[2] && outs <= 2 && Math.random() < 0.6) {
        runs++; bs[key].rbi++;
        if (bs[bases[2]]) bs[bases[2]].r++;
        bases[2] = null;
      }
    } else {
      const adv = advRunners(bases, res, key);
      runs += adv.scored.length; bases = adv.bases;
      hits++; bs[key].ab++; bs[key].h++;
      bs[key].rbi += adv.scored.length;
      adv.scored.forEach(k => { if (bs[k]) bs[k].r++; });
      if (res === 'HR') bs[key].hr++;
      if (res === '2B') bs[key].d++;
      if (res === '3B') bs[key].t++;
    }
    idx++;
  }
  return { runs, hits, nextIdx: idx, bs };
}

function mergeBS(target, source) {
  for (const k in source) {
    if (!target[k]) target[k] = { ab:0, h:0, r:0, rbi:0, bb:0, so:0, hr:0, d:0, t:0 };
    for (const s in source[k]) target[k][s] += source[k][s];
  }
}

function simulateGame(schedGame) {
  const opp = schedGame.opp;
  const isHome = schedGame.isHome;
  const validRot = state.rotation.filter(Boolean);
  if (!validRot.length) return null;
  const spId = validRot[state.season.gamesPlayed % validRot.length];
  const userSP = p(spId);
  const userLU = state.lineup.filter(Boolean).map(id => p(id));
  if (userLU.length < 9) return null;

  const oppLU = genOppLineup(opp.str);
  const oppSP = genOppPitcher(opp.str);
  const awayBat = isHome ? oppLU : userLU;
  const homeBat = isHome ? userLU : oppLU;
  const awayIsUser = !isHome;
  const homeIsUser = isHome;
  const pitchVsAway = isHome ? userSP : oppSP;
  const pitchVsHome = isHome ? oppSP : userSP;

  let aIdx = 0, hIdx = 0, aScore = 0, hScore = 0, aHits = 0, hHits = 0;
  const innA = [], innH = [];
  const aBS = {}, hBS = {};

  for (let inn = 1; inn <= 15; inn++) {
    const top = simHalf(awayBat, pitchVsAway, aIdx, awayIsUser);
    aIdx = top.nextIdx; aScore += top.runs; aHits += top.hits;
    mergeBS(aBS, top.bs); innA.push(top.runs);

    if (inn >= 9 && hScore > aScore) { innH.push('X'); break; }

    const bot = simHalf(homeBat, pitchVsHome, hIdx, homeIsUser);
    hIdx = bot.nextIdx; hScore += bot.runs; hHits += bot.hits;
    mergeBS(hBS, bot.bs); innH.push(bot.runs);

    if (inn >= 9 && hScore > aScore) break;
    if (inn >= 9 && hScore !== aScore) break;
  }

  const userScore = isHome ? hScore : aScore;
  const oppScore = isHome ? aScore : hScore;
  return {
    opp, isHome, userScore, oppScore,
    userHits: isHome ? hHits : aHits,
    oppHits: isHome ? aHits : hHits,
    innA, innH, userSP, oppSP, userLU, oppLU,
    userBS: isHome ? hBS : aBS,
    oppBS: isHome ? aBS : hBS,
    win: userScore > oppScore,
    awayName: isHome ? opp.name : 'Chicago Herons',
    homeName: isHome ? 'Chicago Herons' : opp.name
  };
}

function recordGame(result) {
  state.season.gamesPlayed++;
  if (result.win) state.season.wins++; else state.season.losses++;
  state.season.results.unshift(result);
  if (state.season.results.length > 20) state.season.results.pop();
  state.season.rs += result.userScore;
  state.season.ra += result.oppScore;

  for (const key in result.userBS) {
    const s = result.userBS[key];
    if (!state.season.batting[key]) state.season.batting[key] = { g:0, ab:0, h:0, r:0, rbi:0, bb:0, so:0, hr:0, d:0, t:0 };
    state.season.batting[key].g++;
    for (const f in s) state.season.batting[key][f] += s[f];
  }

  const spId = result.userSP.id;
  if (!state.season.pitching[spId]) state.season.pitching[spId] = { gs:0, w:0, l:0, ip:0, h:0, r:0, bb:0, k:0 };
  const ps = state.season.pitching[spId];
  ps.gs++;
  if (result.win) ps.w++; else ps.l++;
  for (const key in result.oppBS) {
    const s = result.oppBS[key];
    ps.h += s.h; ps.r += s.r; ps.bb += s.bb; ps.k += s.so;
  }
  ps.ip += result.isHome ? result.innA.length : result.innH.filter(r => r !== 'X').length;

  OPPONENTS.forEach(o => {
    const wp = 0.400 + (o.str - 60) * 0.006;
    if (Math.random() < wp) o.w++; else o.l++;
  });

  advanceScouting();
  updateFatigue(result);
  if (state.season.gamesPlayed % 3 === 0) applyFatigueRests();
  if (state.season.gamesPlayed >= 162) calculateAwards();
  autoSave();
}

function playOneGame() {
  if (state.season.gamesPlayed >= 162) return;
  if (state.lineup.filter(Boolean).length < 9 || !state.rotation.filter(Boolean).length) {
    alert('Set your lineup (9 players) and rotation before playing!');
    return;
  }
  const game = state.season.schedule[state.season.gamesPlayed];
  const result = simulateGame(game);
  if (!result) return;
  recordGame(result);
  state.season.lastBox = result;
  updateHeader();
  render();
}

function simWeek() {
  if (state.lineup.filter(Boolean).length < 9 || !state.rotation.filter(Boolean).length) {
    alert('Set your lineup (9 players) and rotation before playing!');
    return;
  }
  let lastResult = null;
  for (let i = 0; i < 7; i++) {
    if (state.season.gamesPlayed >= 162) break;
    const game = state.season.schedule[state.season.gamesPlayed];
    const result = simulateGame(game);
    if (!result) break;
    recordGame(result);
    lastResult = result;
  }
  state.season.lastBox = lastResult;
  updateHeader();
  render();
}

function getStreak() {
  const res = state.season.results;
  if (!res.length) return '---';
  const type = res[0].win ? 'W' : 'L';
  let count = 0;
  for (const r of res) {
    if ((r.win ? 'W' : 'L') === type) count++; else break;
  }
  return type + count;
}

// ════════════════════════ STANDINGS & PLAYOFFS ════════════════════════

function getAllTeams() {
  return [
    { name:'Chicago Herons', abbr:'CHH', w:state.season.wins, l:state.season.losses, div:'AL Central', isUser:true },
    ...OPPONENTS.map(o => ({ name:o.name, abbr:o.abbr, w:o.w, l:o.l, div:o.div, str:o.str, isUser:false }))
  ];
}

function teamPct(t) { return (t.w+t.l)>0 ? t.w/(t.w+t.l) : 0.5; }

function getDivStandings(div) {
  return getAllTeams().filter(t=>t.div===div).sort((a,b)=>teamPct(b)-teamPct(a));
}

function determinePlayoffTeams() {
  const divs = ['AL East','AL Central','AL West'];
  const divWinners = divs.map(d => getDivStandings(d)[0]).sort((a,b)=>teamPct(b)-teamPct(a));
  const dwNames = new Set(divWinners.map(t=>t.name));
  const wc = getAllTeams().filter(t=>!dwNames.has(t.name)).sort((a,b)=>teamPct(b)-teamPct(a)).slice(0,3);
  const seeds = [...divWinners, ...wc];
  return { seeds, divWinners, wildcards: wc };
}

function initPlayoffs() {
  const pt = determinePlayoffTeams();
  const s = pt.seeds;
  const nlTeams = ['Atlanta Firebirds','Los Angeles Condors','Philadelphia Liberty','St. Louis Stags','San Diego Waves','Milwaukee Grizzlies'];
  const nlStr = 78+Math.floor(Math.random()*14);
  const nlWp = 0.4+(nlStr-60)*0.006;
  state.playoffs = {
    seeds: s, round: 'wc',
    wc: [
      { t1:s[2], t2:s[5], w1:0, w2:0, bestOf:3, done:false, winner:null, label:'#3 vs #6' },
      { t1:s[3], t2:s[4], w1:0, w2:0, bestOf:3, done:false, winner:null, label:'#4 vs #5' }
    ],
    ds: [], alcs: null, ws: null,
    nlChamp: { name:nlTeams[Math.floor(Math.random()*nlTeams.length)], w:Math.round(162*nlWp), l:Math.round(162*(1-nlWp)), isUser:false, str:nlStr },
    userMade: s.some(t=>t.isUser),
    userSeed: s.some(t=>t.isUser) ? s.findIndex(t=>t.isUser)+1 : 0,
    wsChamp: null, alChamp: null
  };
  render();
}

function getActiveSeries() {
  const po = state.playoffs;
  if (!po || po.round==='done') return null;
  const arr = po.round==='wc'?po.wc : po.round==='ds'?po.ds : po.round==='alcs'?[po.alcs] : po.round==='ws'?[po.ws] : [];
  return arr.find(s => s && !s.done) || null;
}

function finishSeries(s) {
  const need = Math.ceil(s.bestOf/2);
  const p1 = teamPct(s.t1), p2 = teamPct(s.t2);
  const edge = p1/(p1+p2);
  while (s.w1 < need && s.w2 < need) { Math.random()<edge ? s.w1++ : s.w2++; }
  s.done = true;
  s.winner = s.w1>=need ? s.t1 : s.t2;
  s.loser = s.w1>=need ? s.t2 : s.t1;
}

function checkRoundComplete() {
  const po = state.playoffs;
  if (po.round==='wc' && po.wc.every(s=>s.done)) {
    const wcW = po.wc.map(s=>s.winner).sort((a,b)=>teamPct(a)-teamPct(b));
    po.ds = [
      { t1:po.seeds[0], t2:wcW[0], w1:0, w2:0, bestOf:5, done:false, winner:null, label:'ALDS A' },
      { t1:po.seeds[1], t2:wcW[1], w1:0, w2:0, bestOf:5, done:false, winner:null, label:'ALDS B' }
    ];
    po.round = 'ds';
  } else if (po.round==='ds' && po.ds.length && po.ds.every(s=>s.done)) {
    po.alcs = { t1:po.ds[0].winner, t2:po.ds[1].winner, w1:0, w2:0, bestOf:7, done:false, winner:null, label:'ALCS' };
    po.round = 'alcs';
  } else if (po.round==='alcs' && po.alcs && po.alcs.done) {
    po.ws = { t1:po.alcs.winner, t2:po.nlChamp, w1:0, w2:0, bestOf:7, done:false, winner:null, label:'World Series' };
    po.alChamp = po.alcs.winner;
    po.round = 'ws';
  } else if (po.round==='ws' && po.ws && po.ws.done) {
    po.wsChamp = po.ws.winner;
    po.round = 'done';
  }
}

function simPlayoffGame() {
  const s = getActiveSeries();
  if (!s) return;
  const p1 = teamPct(s.t1), p2 = teamPct(s.t2);
  Math.random() < p1/(p1+p2) ? s.w1++ : s.w2++;
  const need = Math.ceil(s.bestOf/2);
  if (s.w1>=need || s.w2>=need) {
    s.done = true;
    s.winner = s.w1>=need ? s.t1 : s.t2;
    s.loser = s.w1>=need ? s.t2 : s.t1;
    checkRoundComplete();
  }
  render();
}

function simPlayoffSeries() {
  const s = getActiveSeries();
  if (!s) return;
  finishSeries(s);
  checkRoundComplete();
  render();
}

function simPlayoffRound() {
  const po = state.playoffs;
  const arr = po.round==='wc'?po.wc : po.round==='ds'?po.ds : po.round==='alcs'?[po.alcs] : po.round==='ws'?[po.ws] : [];
  arr.forEach(s => { if (s && !s.done) finishSeries(s); });
  checkRoundComplete();
  render();
}

function simAllPlayoffs() {
  while (state.playoffs.round !== 'done') simPlayoffRound();
}

function switchStandings(d) { state.standingsDiv = d; render(); }

function renderStandingsTable(teams) {
  if (!teams.length) return '';
  const leader = teams[0];
  return teams.map((t,i) => {
    const gp2=t.w+t.l, pct=gp2>0?(t.w/gp2).toFixed(3).replace(/^0/,''):'.000';
    const gb=i===0?'---':((((leader.w-t.w)+(t.l-leader.l))/2));
    const gbStr=gb==='---'?gb:(gb<=0?'---':gb.toFixed(1));
    return `<tr style="cursor:default;${t.isUser?'background:var(--gold-bg);font-weight:600':''}">
      <td style="font-family:var(--font-serif)">${t.isUser?'&#9918; ':''}${t.name}</td>
      <td class="stat-num">${t.w}</td><td class="stat-num">${t.l}</td>
      <td class="stat-num">${pct}</td><td class="stat-num">${gbStr}</td></tr>`;
  }).join('');
}

function renderSeriesCard(s) {
  if (!s) return `<div style="padding:10px 12px;background:var(--bg-alt);border:1px solid var(--border-light);border-radius:var(--radius);margin-bottom:6px;text-align:center;color:var(--text-muted);font-size:0.85rem">TBD</div>`;
  const live = !s.done && (s.w1>0||s.w2>0);
  const pending = !s.done && s.w1===0 && s.w2===0;
  const userW = s.winner && s.winner.isUser;
  const bg = s.done&&userW ? 'var(--gold-bg)' : live ? '#fefce8' : 'white';
  const bdr = live ? 'var(--gold)' : 'var(--border-light)';
  return `<div style="padding:8px 12px;background:${bg};border:1px solid ${bdr};border-radius:var(--radius);margin-bottom:6px">
    <div style="font-size:0.70rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">${s.label}${live?' <span style="color:var(--gold)">&#9679; Game '+(s.w1+s.w2+1)+'</span>':''}</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-family:var(--font-serif);font-weight:600;font-size:0.9rem;${s.done&&s.w1<s.w2?'opacity:0.45':''}">${s.t1.name}</span>
      <span class="stat-num" style="font-weight:700;${s.w1>=s.w2?'color:var(--navy)':'color:var(--text-muted)'}">${s.w1}</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">
      <span style="font-family:var(--font-serif);font-weight:600;font-size:0.9rem;${s.done&&s.w2<s.w1?'opacity:0.45':''}">${s.t2.name}</span>
      <span class="stat-num" style="font-weight:700;${s.w2>=s.w1?'color:var(--navy)':'color:var(--text-muted)'}">${s.w2}</span>
    </div>
  </div>`;
}

function renderPlayoffBracket() {
  const po = state.playoffs;
  if (!po) return '';
  const isDone = po.round==='done';
  const isChamp = po.wsChamp && po.wsChamp.isUser;
  const roundLabel = {wc:'Wild Card Series',ds:'Division Series',alcs:'AL Championship',ws:'World Series',done:'Postseason Complete'};

  return `
    <div class="card" style="margin-top:16px">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>${isChamp?'&#127942; ':''}Postseason${isChamp?' &mdash; WORLD CHAMPIONS!':''}</span>
        <span style="font-size:0.8rem;font-family:var(--font-sans);font-weight:600;color:${isDone?'var(--green)':'var(--gold)'}">${isDone?'Complete':roundLabel[po.round]}</span>
      </div>
      ${po.userMade?`<div style="margin-bottom:10px;font-size:0.85rem">Chicago Herons: <b>#${po.userSeed} seed</b></div>`
        :`<div style="margin-bottom:10px;font-size:0.85rem;color:var(--text-muted)">Chicago Herons did not qualify</div>`}
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        <div>
          <div style="font-size:0.70rem;font-weight:700;letter-spacing:1.5px;color:${po.round==='wc'?'var(--navy)':'var(--text-muted)'};margin-bottom:8px;text-transform:uppercase">Wild Card (Bo3)</div>
          ${po.wc.map(s=>renderSeriesCard(s)).join('')}
        </div>
        <div>
          <div style="font-size:0.70rem;font-weight:700;letter-spacing:1.5px;color:${po.round==='ds'?'var(--navy)':'var(--text-muted)'};margin-bottom:8px;text-transform:uppercase">Div Series (Bo5)</div>
          ${po.ds.length ? po.ds.map(s=>renderSeriesCard(s)).join('') : renderSeriesCard(null)+renderSeriesCard(null)}
        </div>
        <div>
          <div style="font-size:0.70rem;font-weight:700;letter-spacing:1.5px;color:${po.round==='alcs'?'var(--navy)':'var(--text-muted)'};margin-bottom:8px;text-transform:uppercase">ALCS (Bo7)</div>
          ${renderSeriesCard(po.alcs)}
        </div>
        <div>
          <div style="font-size:0.70rem;font-weight:700;letter-spacing:1.5px;color:${po.round==='ws'?'var(--navy)':'var(--text-muted)'};margin-bottom:8px;text-transform:uppercase">World Series (Bo7)</div>
          ${renderSeriesCard(po.ws)}
          ${isChamp?`<div style="text-align:center;font-family:var(--font-serif);font-size:1rem;font-weight:700;color:var(--navy);margin-top:8px">&#127942; CHAMPIONS &#127942;</div>`:''}
        </div>
      </div>
      ${!isDone?`<div style="display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-navy" onclick="simPlayoffGame()"${!active?' disabled':''}>${active?'Sim Game '+(active.w1+active.w2+1):'Sim Game'}</button>
        <button class="btn btn-outline" onclick="simPlayoffSeries()">Sim Series</button>
        <button class="btn btn-outline" onclick="simPlayoffRound()">Sim Round</button>
        <button class="btn btn-outline" onclick="simAllPlayoffs()">Sim All</button>
      </div>`:''}
    </div>`;
}

function renderPlay() {
  const gp = state.season.gamesPlayed;
  const nextGame = gp < 162 ? state.season.schedule[gp] : null;
  const validRot = state.rotation.filter(Boolean);
  const nextSP = validRot.length ? p(validRot[gp % validRot.length]) : null;
  const hasLineup = state.lineup.filter(Boolean).length >= 9;
  const ready = hasLineup && validRot.length;
  const seasonOver = gp >= 162;

  const warning = !ready && !seasonOver ? `<div class="alert-item" style="margin-bottom:16px"><span class="alert-icon">&#9888;</span><span class="alert-text">Set your <b>Lineup</b> (need 9 players) and <b>Rotation</b> (need at least 1 starter) before playing.</span></div>` : '';

          <div class="game-team">

            <div class="game-team-name">${nextGame.opp.name}</div>

          </div>
          <div class="game-at">@</div>
          <div class="game-team">
            <div class="game-team-label">${nextGame.isHome ? 'Home' : 'Away'}</div>

        ${nextSP ? `<div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px">Starting: <b style="color:var(--text)">${nextSP.fn} ${nextSP.ln}</b> (${nextSP.pitching.era.toFixed(2)} ERA)</div>` : ''}
        <div class="play-actions">

    const userSeed = userIn ? pt.seeds.findIndex(s=>s.isUser)+1 : 0;
    topCard = `
      <div class="card" style="grid-column:span 2">
        <div class="card-title">Season Complete</div>
        <div style="text-align:center;padding:16px 0">
          <div style="font-family:var(--font-serif);font-size:1.3rem;color:var(--navy);margin-bottom:6px">Final Record: ${state.season.wins}-${state.season.losses}</div>
          <div style="font-size:0.9rem;color:${userIn?'var(--green)':'var(--text-muted)'};font-weight:600;margin-bottom:16px">
            ${userIn ? '&#9989; Clinched Playoff Spot &mdash; #'+userSeed+' Seed' : '&#10060; Did Not Qualify for Playoffs'}
            ${(()=>{
              const po = state.playoffs;
              if (!po || po.round !== 'done' || !userIn) return '';
              if (po.wsChamp && po.wsChamp.isUser) return '<br>&#127942; Won the World Series!';
              if (po.ws && po.ws.t1.isUser || po.ws && po.ws.t2.isUser) return '<br>Lost in the World Series';
              if (po.alcs && (po.alcs.t1.isUser || po.alcs.t2.isUser)) return '<br>Lost in the ALCS';
              if (po.ds.some(s=>s.t1.isUser||s.t2.isUser)) return '<br>Lost in the ALDS';
              if (po.wc.some(s=>s.t1.isUser||s.t2.isUser)) return '<br>Lost in the Wild Card Series';
              return '';
            })()}
          </div>
          ${!state.playoffs ?
            `<button class="btn btn-navy" onclick="initPlayoffs()" style="padding:12px 28px;font-size:1rem">Begin Postseason &#9918;</button>` :
            (state.playoffs.round === 'done' ?
              `<button class="btn btn-navy" onclick="enterOffseason()" style="padding:12px 28px;font-size:1rem">Enter Off-Season &rarr;</button>` : '')}

  }

  // Standings
  const stdTabs = [{id:'east',l:'AL East'},{id:'central',l:'AL Central'},{id:'west',l:'AL West'},{id:'wc',l:'Wild Card'}];
  const ad = state.standingsDiv || 'central';
  let standingsRows;
  if (ad === 'wc') {
    const all = getAllTeams();
    const dw = ['AL East','AL Central','AL West'].map(d=>getDivStandings(d)[0]);
    const dwN = new Set(dw.map(t=>t.name));
    const wcTeams = all.filter(t=>!dwN.has(t.name)).sort((a,b)=>teamPct(b)-teamPct(a));
    const top3 = wcTeams.slice(0,3);

    standingsRows = top3.map((t,i) => {
      const gp2=t.w+t.l, pct=gp2>0?(t.w/gp2).toFixed(3).replace(/^0/,''):'.000';
      return `<tr style="cursor:default;${t.isUser?'background:var(--gold-bg);font-weight:600':''}">
        <td style="font-family:var(--font-serif)"><span style="color:var(--green);font-weight:700">WC${i+1}</span> ${t.isUser?'&#9918; ':''}${t.name}</td>

        <td style="font-family:var(--font-serif)">${t.isUser?'&#9918; ':''}${t.name}</td>
        <td class="stat-num">${t.w}</td><td class="stat-num">${t.l}</td><td class="stat-num">${pct}</td><td></td></tr>`;
    }).join('');
  } else {
    const divName = 'AL '+ad.charAt(0).toUpperCase()+ad.slice(1);
    standingsRows = renderStandingsTable(getDivStandings(divName));
  }

  return `
    ${warning}
    <div class="dash-grid">
      ${topCard}
      <div class="card">
        <div class="card-title">Season ${state.seasonNumber}</div>
        <div class="card-value">${state.season.wins} &ndash; ${state.season.losses}</div>
        <div class="card-sub">${gp > 0 ? ('.'+((state.season.wins/gp).toFixed(3).slice(2))+' &bull; Streak: '+getStreak()) : 'Play your first game!'}</div>
      </div>
    </div>

    ${state.playoffs ? renderPlayoffBracket() : ''}
    ${seasonOver && state.awards ? renderSeasonRecap() : ''}
    ${!seasonOver && state.season.lastBox ? renderBoxScore(state.season.lastBox) : ''}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px">
      <div class="card">
        <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;padding-bottom:10px">
          <span>AL Standings</span>
          <div class="filter-group">
            ${stdTabs.map(t=>`<button class="filter-btn ${ad===t.id?'active':''}" onclick="switchStandings('${t.id}')" style="padding:4px 8px;font-size:0.7rem">${t.l}</button>`).join('')}
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th style="cursor:default">Team</th><th style="cursor:default">W</th><th style="cursor:default">L</th><th style="cursor:default">PCT</th><th style="cursor:default">GB</th></tr></thead>
            <tbody>${standingsRows}</tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Recent Results</div>
        ${state.season.results.length ? state.season.results.slice(0,8).map(r => `
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light)">
            <span class="result-badge ${r.win?'win':'loss'}">${r.win?'W':'L'}</span>
            <span style="font-family:var(--font-serif);font-weight:600;flex:1">${r.isHome?'vs':'@'} ${r.opp.name}</span>
            <span class="stat-num" style="font-weight:700">${r.userScore} &ndash; ${r.oppScore}</span>
          </div>
        `).join('') : '<div style="text-align:center;padding:20px;color:var(--text-muted)">No games played yet</div>'}
      </div>
    </div>
  `;
}

function renderBoxScore(box) {
  const maxInn = Math.max(box.innA.length, box.innH.length);
  const innHeaders = Array.from({length:maxInn}, (_,i) => `<th style="cursor:default;min-width:26px;text-align:center">${i+1}</th>`).join('');

  const awayInns = box.innA.map(r => `<td class="stat-num" style="text-align:center">${r}</td>`).join('');
  let homeInns = box.innH.map(r => `<td class="stat-num" style="text-align:center">${r==='X'?'X':r}</td>`).join('');
  if (box.innH.length < box.innA.length) {
    homeInns += `<td class="stat-num" style="text-align:center">X</td>`;
  }

  const aTotal = box.isHome ? box.oppScore : box.userScore;
  const hTotal = box.isHome ? box.userScore : box.oppScore;
  const aHits = box.isHome ? box.oppHits : box.userHits;
  const hHits = box.isHome ? box.userHits : box.oppHits;

  function batRows(lineup, stats, isUser) {
    return lineup.map((pl, i) => {
      const key = isUser ? pl.id : i;
      const s = stats[key] || {ab:0,h:0,r:0,rbi:0,bb:0,so:0,hr:0};
      const name = isUser ? (pl.fn + ' ' + pl.ln) : pl.name;
      const pos = isUser ? pl.pos : pl.pos;
      return `<tr style="cursor:default"><td style="font-family:var(--font-serif)">${name}</td><td><span class="pos-badge">${pos}</span></td><td class="stat-num">${s.ab}</td><td class="stat-num">${s.h}</td><td class="stat-num">${s.r}</td><td class="stat-num">${s.rbi}</td><td class="stat-num">${s.bb}</td><td class="stat-num">${s.so}</td><td class="stat-num" style="font-weight:700">${s.hr||''}</td></tr>`;
    }).join('');
  }

  return `
    <div class="card" style="margin-top:16px">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>Box Score</span>
        <span style="font-size:0.85rem;font-family:var(--font-mono);color:${box.win?'var(--green)':'var(--red)'};font-weight:700">${box.win?'WIN':'LOSS'} ${box.userScore}&ndash;${box.oppScore}</span>
      </div>
      <div class="table-wrap" style="margin-bottom:16px">
        <table class="line-score-table">
          <thead><tr><th style="cursor:default;min-width:140px"></th>${innHeaders}<th style="cursor:default;min-width:30px;text-align:center;border-left:2px solid var(--border)">R</th><th style="cursor:default;min-width:30px;text-align:center">H</th></tr></thead>
          <tbody>
            <tr style="cursor:default;${!box.isHome?'background:var(--gold-bg)':''}"><td style="font-family:var(--font-serif);font-weight:600">${box.awayName}</td>${awayInns}<td class="stat-num" style="text-align:center;font-weight:700;border-left:2px solid var(--border)">${box.isHome?box.oppScore:box.userScore}</td><td class="stat-num" style="text-align:center">${aHits}</td></tr>
            <tr style="cursor:default;${box.isHome?'background:var(--gold-bg)':''}"><td style="font-family:var(--font-serif);font-weight:600">${box.homeName}</td>${homeInns}<td class="stat-num" style="text-align:center;font-weight:700;border-left:2px solid var(--border)">${box.isHome?box.userScore:box.oppScore}</td><td class="stat-num" style="text-align:center">${hHits}</td></tr>
          </tbody>
        </table>
      </div>
      <div class="box-halves">
        <div>
          <div style="font-family:var(--font-serif);font-size:0.72rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px">Chicago Herons &mdash; ${box.userSP.fn} ${box.userSP.ln} (SP)</div>
          <div class="table-wrap"><table><thead><tr><th style="cursor:default">Batter</th><th style="cursor:default">Pos</th><th style="cursor:default">AB</th><th style="cursor:default">H</th><th style="cursor:default">R</th><th style="cursor:default">RBI</th><th style="cursor:default">BB</th><th style="cursor:default">SO</th><th style="cursor:default">HR</th></tr></thead>
          <tbody>${batRows(box.userLU, box.userBS, true)}</tbody></table></div>
        </div>
        <div>
          <div style="font-family:var(--font-serif);font-size:0.72rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px">${box.opp.name} &mdash; ${box.oppSP.name} (SP)</div>
          <div class="table-wrap"><table><thead><tr><th style="cursor:default">Batter</th><th style="cursor:default">Pos</th><th style="cursor:default">AB</th><th style="cursor:default">H</th><th style="cursor:default">R</th><th style="cursor:default">RBI</th><th style="cursor:default">BB</th><th style="cursor:default">SO</th><th style="cursor:default">HR</th></tr></thead>
          <tbody>${batRows(box.oppLU, box.oppBS, false)}</tbody></table></div>
        </div>
      </div>
    </div>
  `;
}

init();
</script>
</body>
</html>
